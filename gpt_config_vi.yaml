# ════════════════════════════════════════════════════════════
# Translation style — chọn phong cách dịch mặc định cho MIT backend.
# Có thể ghi đè từ UI mỗi lần dịch.
# Options: modern | wuxia | school | lightnovel
active_style: modern

# ── Style metadata (dùng trong web UI) ───────────────────
styles:
  modern:
    label: "Hiện đại / Slice-of-life"
    description: "Romance đương đại, daily life, hiện đại"
  wuxia:
    label: "Cổ trang / Kiếm hiệp"
    description: "Tiên hiệp, kiếm hiệp, cổ trang, fantasy lịch sử"
  school:
    label: "Học đường / Romance"
    description: "Học đường, thầy cô học sinh, youth romance"
  lightnovel:
    label: "Light Novel / Manga Nhật"
    description: "Isekai, shounen, shoujo, light novel tiếng Nhật"

# ── MIT / Ollama backend config ───────────────────────────
# QUAN TRỌNG — NGUỒN DUY NHẤT của system prompt (CORE RULES + PRONOUNS theo style)
# nằm trong code:  translator_engine_pkg/_mit_backend.py
#   • _GPT_BASE_RULES      → 12 CORE RULES dùng chung mọi style.
#   • _GPT_STYLE_BLOCKS    → khối PRONOUNS/xưng hô riêng cho từng style
#                            (_GPT_STYLE_MODERN / _WUXIA / _SCHOOL / _LIGHTNOVEL).
# Backend compose `_GPT_BASE_RULES + style_block` ra một gpt_config TẠM cho MỌI
# style (kể cả 'modern') rồi mới gọi MIT → file này KHÔNG còn nhúng
# chat_system_template (tránh hai bản trôi lệch nhau). Sửa prompt/xưng hô: sửa ở
# _mit_backend.py, KHÔNG sửa ở đây.
ollama:
  # ── Sampling ──────────────────────────────────────────────
  # NGUỒN SỰ THẬT cho sampling nằm trong code: custom_openai _DETERMINISTIC
  # (mặc định True → temp=0.7/top_p=0.8/top_k=20 + seed cố định 1234 → mỗi lần
  # dịch ra ĐÚNG cùng kết quả nhờ SEED). Hai giá trị dưới CHỈ là fallback "sáng
  # tác" khi _DETERMINISTIC=False; backend cũng ghi đè chúng vào config tạm.
  temperature: 0.1
  top_p: 0.85
