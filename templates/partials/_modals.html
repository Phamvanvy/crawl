<!-- ── Lightbox ─────────────────────────────────────────────────────────── -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Xem ảnh phóng to">
  <!-- backdrop closes -->
  <div class="lb-backdrop" onclick="closeLightbox()"></div>

  <!-- nav arrows -->
  <button class="lb-nav lb-prev" id="lbPrevBtn" onclick="lbPrev()" aria-label="Ảnh trước">&#8249;</button>
  <button class="lb-nav lb-next" id="lbNextBtn" onclick="lbNext()" aria-label="Ảnh sau">&#8250;</button>

  <!-- image wrapper (zoom container) -->
  <div class="lb-img-wrap" id="lbImgWrap">
    <img id="lightboxImg" src="" alt="" draggable="false" />
    <!-- So sánh gốc ↔ đã dịch (ẩn mặc định) -->
    <div class="lb-compare" id="lbCompare" style="display:none">
      <figure class="lb-cmp-fig">
        <figcaption>Gốc</figcaption>
        <img id="lbOrigImg" src="" alt="Ảnh gốc" draggable="false" />
        <div class="lb-cmp-missing" id="lbOrigMissing" style="display:none">Không tìm thấy ảnh gốc trong thư mục nguồn.</div>
      </figure>
      <figure class="lb-cmp-fig">
        <figcaption>Đã dịch</figcaption>
        <img id="lbTransImg" src="" alt="Ảnh đã dịch" draggable="false" />
      </figure>
    </div>
  </div>

  <!-- top bar -->
  <div class="lb-topbar">
    <span class="lb-counter" id="lbCounter">1 / 1</span>
    <span class="lb-name" id="lbName"></span>
    <button class="lb-close" onclick="closeLightbox()" aria-label="Đóng">✕</button>
  </div>

  <!-- bottom toolbar -->
  <div class="lb-toolbar" onclick="event.stopPropagation()">
    <button class="lb-tool" onclick="lbZoomOut()" title="Thu nhỏ (−)" aria-label="Thu nhỏ">&#x2212;</button>
    <button class="lb-tool lb-zoom-reset" id="lbZoomLabel" onclick="lbZoomReset()" title="Reset zoom" aria-label="Đặt lại zoom">100%</button>
    <button class="lb-tool" onclick="lbZoomIn()"  title="Phóng to (+)" aria-label="Phóng to">+</button>
    <div class="lb-sep"></div>
    <button class="lb-tool lb-cmp" id="lbCompareBtn" onclick="lbToggleCompare()" title="So sánh ảnh gốc và ảnh đã dịch (phím C)" aria-label="So sánh gốc và đã dịch" style="display:none">⇄ So sánh gốc</button>
    <button class="lb-tool lb-pin" id="lbPinBtn" onclick="lbTogglePin()" title="Ghim ảnh này lên đầu (phím P)" aria-label="Ghim ảnh này" style="display:none">📌 Ghim</button>
    <button class="lb-tool lb-del" id="lbDelBtn" onclick="lbDelete()" title="Xóa ảnh này" aria-label="Xóa ảnh này">🗑 Xóa</button>
  </div>
</div>

<!-- ── Folder browser modal ────────────────────────────────────────────── -->
<div class="fb-overlay" id="fbOverlay" onclick="fbOverlayClick(event)">
  <div class="fb-dialog" role="dialog" aria-modal="true" aria-labelledby="fbTitle" tabindex="-1">
    <div class="fb-header">
      <span class="fb-title" id="fbTitle">📁 Chọn thư mục lưu ảnh</span>
      <button class="fb-close" onclick="closeFolderBrowser()" aria-label="Đóng">✕</button>
    </div>
    <div class="fb-breadcrumb" id="fbBreadcrumb">—</div>
    <div class="fb-body" id="fbBody">
      <div class="fb-loading">Đang tải…</div>
    </div>
    <div class="fb-footer">
      <span class="fb-selected-path" id="fbSelectedPath">Chưa chọn thư mục</span>
      <button class="btn btn-ghost" onclick="closeFolderBrowser()">Hủy</button>
      <button class="btn btn-primary" id="fbConfirmBtn" onclick="confirmFolder()" disabled>✔ Chọn thư mục này</button>
    </div>
  </div>
</div>
