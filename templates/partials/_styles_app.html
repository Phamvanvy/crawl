<style>
    /* ── Lightbox ───────────────────────────────────────────────────────── */
    .lightbox {
      display: none; position: fixed; inset: 0;
      z-index: 2000; align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lb-backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.90);
    }
    /* image wrapper */
    .lb-img-wrap {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      max-width: 92vw; max-height: 88vh;
      overflow: hidden;
      cursor: grab;
    }
    .lb-img-wrap.dragging { cursor: grabbing; }
    #lightboxImg {
      max-width: 100%; max-height: 88vh;
      border-radius: 4px;
      transform-origin: center center;
      transition: transform .15s ease;
      user-select: none; pointer-events: none;
    }
    /* nav arrows */
    .lb-nav {
      position: absolute; top: 50%; z-index: 2;
      transform: translateY(-50%);
      background: rgba(0,0,0,.45); color: #fff;
      border: none; border-radius: 50%;
      width: 44px; height: 44px;
      font-size: 1.8rem; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .lb-nav:hover { background: rgba(255,255,255,.2); }
    .lb-nav:disabled { opacity: .2; cursor: default; }
    .lb-prev { left: 14px; }
    .lb-next { right: 14px; }
    /* top bar */
    .lb-topbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 3;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,.65), transparent);
    }
    .lb-counter {
      font-size: .8rem; color: rgba(255,255,255,.75);
      flex-shrink: 0;
    }
    .lb-name {
      flex: 1; font-size: .78rem; color: rgba(255,255,255,.65);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .lb-close {
      background: none; border: none; color: #fff;
      font-size: 1.4rem; cursor: pointer; line-height: 1;
      padding: 2px 4px; flex-shrink: 0;
    }
    /* bottom toolbar */
    .lb-toolbar {
      position: absolute; bottom: 0; left: 50%; z-index: 3;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px 12px;
      background: linear-gradient(to top, rgba(0,0,0,.65), transparent);
      border-radius: 0 0 8px 8px;
    }
    .lb-tool {
      background: rgba(255,255,255,.12); color: #fff;
      border: 1px solid rgba(255,255,255,.18); border-radius: 6px;
      padding: 5px 12px; font-size: .82rem; cursor: pointer;
      transition: background .12s;
      min-width: 36px;
    }
    .lb-tool:hover { background: rgba(255,255,255,.25); }
    .lb-zoom-reset { min-width: 52px; font-variant-numeric: tabular-nums; }
    .lb-del { color: #ff7b7b; border-color: rgba(255,100,100,.35); }
    .lb-del:hover { background: rgba(220,40,40,.35); }
    .lb-sep { width: 1px; height: 20px; background: rgba(255,255,255,.2); margin: 0 4px; }

    /* ── Folder browser modal ───────────────────────────────────────────── */
    .fb-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }
    .fb-overlay.open { display: flex; }
    .fb-dialog {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: min(580px, 96vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
      overflow: hidden;
    }
    .fb-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
    }
    .fb-title { font-weight: 700; font-size: 0.9rem; }
    .fb-close {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 1.1rem; line-height: 1;
      padding: 2px 6px; border-radius: 4px;
    }
    .fb-close:hover { background: var(--surface2); color: var(--text); }
    .fb-breadcrumb {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--surface2);
      font-family: var(--mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }
    .fb-body {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    .fb-entry {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: 0.85rem;
      border-bottom: 1px solid transparent;
      transition: background .1s;
      user-select: none;
    }
    .fb-entry:hover { background: var(--surface2); }
    .fb-entry .fb-icon { font-size: 1rem; flex-shrink: 0; }
    .fb-entry .fb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fb-entry .fb-arrow { color: var(--text-muted); font-size: 0.72rem; }
    .fb-entry.fb-up { color: var(--text-muted); }
    .fb-empty {
      text-align: center;
      padding: 32px;
      color: var(--text-muted);
      font-size: 0.82rem;
    }
    .fb-loading {
      text-align: center;
      padding: 32px;
      color: var(--text-muted);
      font-size: 0.82rem;
    }
    .fb-footer {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      background: var(--surface2);
    }
    .fb-selected-path {
      flex: 1;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--accent);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── optgroup style ─────────────────────────────────────────────────── */
    select optgroup { font-weight: 700; font-size: .75rem; color: var(--text-muted); }
    .status-text { font-size: 0.82rem; color: var(--text-muted); }

    /* ── Backend selector cards ─────────────────────────────────────────── */
    .backend-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .backend-option {
      position: relative;
      cursor: pointer;
    }
    .backend-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .backend-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 11px 8px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      transition: all .15s;
      text-align: center;
      cursor: pointer;
    }
    .backend-option:hover .backend-card { border-color: var(--accent); }
    .backend-option input:checked + .backend-card {
      border-color: var(--accent);
      background: var(--accent-dim);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .backend-card .bc-icon  { font-size: 1.4rem; line-height: 1.2; }
    .backend-card .bc-label { font-size: .82rem; font-weight: 700; color: var(--text); }
    .backend-card .bc-sub   { font-size: .68rem; color: var(--text-muted); }

    /* ── MIT API key alert ──────────────────────────────────────────────── */
    .api-key-alert {
      display: none;
      font-size: .75rem;
      padding: 8px 10px;
      border-radius: 6px;
      background: var(--yellow-dim);
      border: 1px solid var(--yellow);
      color: var(--yellow);
      line-height: 1.5;
    }
    .api-key-alert.visible { display: block; }

    /* ── Advanced section toggle ────────────────────────────────────────── */
    .adv-toggle {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border-radius: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: .78rem;
      font-weight: 600;
      color: var(--text-muted);
      user-select: none;
      transition: all .15s;
      list-style: none;
    }
    .adv-toggle:hover { border-color: var(--accent); color: var(--accent); }
    details[open] .adv-toggle { border-color: var(--accent); color: var(--accent); }

    /* ── Tooltip ─────────────────────────────────────────────────────────── */
    .tt-wrap { display: inline-flex; align-items: center; gap: 4px; }
    .tt-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--text-muted); color: var(--bg);
      font-size: .6rem; font-weight: 700; cursor: default;
      flex-shrink: 0; line-height: 1;
    }
    /* .tt-box hidden — text source only, rendered via #tt-float */
    .tt-box { display: none; }
    /* Floating tooltip box — appended to <body>, positioned via JS */
    #tt-float {
      display: none;
      position: fixed; z-index: 99999;
      background: #1a1a2e; color: #e8e8f0;
      border: 1px solid rgba(124,106,247,.5);
      border-radius: 8px; padding: 9px 12px;
      font-size: .72rem; line-height: 1.55;
      white-space: pre-wrap; max-width: 280px; min-width: 180px;
      box-shadow: 0 6px 24px rgba(0,0,0,.65);
      pointer-events: none;
    }
    #tt-float.visible { display: block; }
    .adv-arrow {
      display: inline-block;
      transition: transform .2s;
      font-size: .65rem;
    }
    details[open] .adv-arrow { transform: rotate(90deg); }

    /* ── Checkbox grid items ────────────────────────────────────────────── */
    .cb-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .cb-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      cursor: pointer;
      font-size: .8rem;
      font-weight: 500;
      transition: border-color .15s;
      user-select: none;
    }
    .cb-item:hover { border-color: var(--accent); }
    .cb-item input { accent-color: var(--accent); flex-shrink: 0; cursor: pointer; }
    .cb-item.span2 { grid-column: 1 / -1; }

    /* ── MIT section divider ────────────────────────────────────────────── */
    .mit-section { display: flex; flex-direction: column; gap: 10px; }

    /* ── Language select ────────────────────────────────────────────────── */
    .lang-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 0.78rem;
      color: var(--text-muted);
      font-family: inherit;
      outline: none;
      transition: all .15s;
    }
    .lang-select:hover, .lang-select:focus { border-color: var(--accent); color: var(--accent); }

    /* ── Viewer tab ─────────────────────────────────────────────────────── */
    .viewer-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 16px;
      max-width: 1700px;
      margin: 0 auto;
      align-items: start;
    }
    @media (max-width: 860px) { .viewer-layout { grid-template-columns: 1fr; } }

    .viewer-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 130px);
      min-height: 420px;
      position: sticky;
      top: 16px;
    }

    .viewer-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .viewer-folder-name {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-muted);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .viewer-fit-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-muted);
      padding: 3px 7px;
      font-family: inherit;
      font-size: .72rem;
      cursor: pointer;
      outline: none;
      flex-shrink: 0;
    }

    /* scroll view */
    .viewer-scroll {
      flex: 1;
      overflow-y: auto;
      background: #0a0a0a;
    }
    .viewer-scroll img            { display: block; width: 100%; margin: 0 auto;
                                    content-visibility: auto;
                                    contain-intrinsic-size: 0 900px; }
    .viewer-scroll.fit-width img  { max-width: 900px; }
    .viewer-scroll.fit-contain img{ max-width: 100%; height: auto; max-height: 96vh; object-fit: contain; }
    .viewer-scroll.fit-original img{ width: auto; max-width: none; }

    /* page view */
    .viewer-page-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0a0a0a;
    }
    .vpage-img-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 6px;
      cursor: pointer;
    }
    .vpage-img-area img               { max-width: 100%; max-height: 100%; object-fit: contain; transition: opacity .15s; }
    .vpage-img-area.fit-width img     { width: 100%; max-width: 900px; height: auto; max-height: none; }
    .vpage-img-area.fit-original img  { max-width: none; max-height: none; }
    .vpage-img-area.fit-contain img   { max-width: 100%; max-height: 100%; object-fit: contain; }

    .vpage-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 10px 14px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .vpage-nav-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .85rem;
      font-weight: 600;
      padding: 6px 20px;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
      min-width: 80px;
    }
    .vpage-nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .vpage-nav-btn:disabled             { opacity: .3; cursor: not-allowed; }
    .vpage-counter {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      min-width: 90px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    /* empty/loading */
    .viewer-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 280px;
      color: var(--text-muted);
      font-size: .88rem;
      flex-direction: column;
      gap: 10px;
    }

    /* mode buttons */
    .viewer-mode-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .viewer-mode-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 12px 8px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      cursor: pointer;
      font-family: inherit;
      font-size: .8rem;
      font-weight: 600;
      color: var(--text-muted);
      transition: all .15s;
      text-align: center;
    }
    .viewer-mode-btn .vm-icon { font-size: 1.4rem; line-height: 1.3; }
    .viewer-mode-btn small    { font-size: .68rem; font-weight: 400; }
    .viewer-mode-btn:hover    { border-color: var(--accent); }
    .viewer-mode-btn.active   { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
    .viewer-mode-btn.active small { color: var(--accent); opacity: .75; }
</style>
