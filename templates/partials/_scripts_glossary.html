<script>
// ── Glossary dùng chung (global) — quản lý cặp zh→vi trên UI ────────────────
// Gọi API /api/glossary/global*. Bảng cho xem/sửa inline/bật-tắt/xoá/dedup. Mục
// "Áp" (enabled) sẽ được hợp nhất khi dịch bộ có tích "📚 Áp Glossary chung".
let _gItems = [];
let _gSearchTimer = null;

function gEsc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function gSetCounts(c) {
  if (!c) return;
  $('gCounts').textContent =
    `${c.total} cặp · ${c.enabled} đã duyệt · ${c.pending} chờ duyệt`;
}

async function gLoad() {
  const q = ($('gSearch') ? $('gSearch').value : '').trim();
  const status = $('gStatus') ? $('gStatus').value : '';
  const body = $('gBody');
  body.innerHTML = '<tr><td colspan="6" style="padding:16px;text-align:center;color:var(--text-muted)">Đang tải…</td></tr>';
  try {
    const url = '/api/glossary/global?q=' + encodeURIComponent(q)
              + '&status=' + encodeURIComponent(status);
    const res = await fetch(url);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'lỗi');
    _gItems = data.items || [];
    gSetCounts(data.counts);
    gRender();
  } catch (e) {
    body.innerHTML = '<tr><td colspan="6" style="padding:16px;text-align:center;color:var(--danger,#e66)">Lỗi: '
                   + gEsc(e.message || e) + '</td></tr>';
  }
}

function gOnSearch() {
  clearTimeout(_gSearchTimer);
  _gSearchTimer = setTimeout(gLoad, 280);
}

function gRender() {
  const body = $('gBody');
  if (!_gItems.length) {
    body.innerHTML = '<tr><td colspan="6" style="padding:16px;text-align:center;color:var(--text-muted)">Chưa có cặp từ nào.</td></tr>';
    if ($('gCheckAll')) $('gCheckAll').checked = false;
    gUpdateSelInfo();
    return;
  }
  body.innerHTML = _gItems.map(it => {
    const src = (it.sources || []).join(', ');
    const pend = it.enabled ? '' : ' title="Chờ duyệt"';
    const rowStyle = it.enabled ? '' : 'opacity:.62';
    return `<tr data-id="${it.id}" style="border-top:1px solid var(--border);${rowStyle}">
      <td style="padding:7px 10px"><input type="checkbox" class="g-sel" onchange="gUpdateSelInfo()"></td>
      <td style="padding:7px 10px">
        <label class="g-switch" style="cursor:pointer;display:inline-flex;align-items:center;gap:5px">
          <input type="checkbox" ${it.enabled ? 'checked' : ''} onchange="gToggleOne(${it.id}, this.checked)">
          <span style="font-size:.7rem;color:var(--text-muted)"${pend}>${it.enabled ? 'bật' : 'chờ'}</span>
        </label>
      </td>
      <td style="padding:7px 10px"><input class="g-zh" value="${gEsc(it.zh)}"
        style="width:100%;padding:5px 7px;border:1px solid transparent;border-radius:6px;background:transparent;color:var(--text);font-size:.84rem"
        onfocus="this.style.borderColor='var(--border)';this.style.background='var(--surface2,#26262f)'"
        onblur="gSaveRow(${it.id})"></td>
      <td style="padding:7px 10px"><input class="g-vi" value="${gEsc(it.vi)}"
        style="width:100%;padding:5px 7px;border:1px solid transparent;border-radius:6px;background:transparent;color:var(--text);font-size:.84rem"
        onfocus="this.style.borderColor='var(--border)';this.style.background='var(--surface2,#26262f)'"
        onblur="gSaveRow(${it.id})"></td>
      <td style="padding:7px 10px;font-size:.72rem;color:var(--text-muted)" title="${gEsc(src)}">${gEsc(src)}</td>
      <td style="padding:7px 10px;text-align:right;white-space:nowrap">
        <button class="btn btn-ghost" style="padding:4px 8px;font-size:.72rem" title="AI dịch lại mục này" onclick="gRetranslate([${it.id}])">🤖</button>
        <button class="btn btn-danger" style="padding:4px 9px;font-size:.72rem" onclick="gDeleteOne(${it.id})">🗑</button>
      </td>
    </tr>`;
  }).join('');
  if ($('gCheckAll')) $('gCheckAll').checked = false;
  gUpdateSelInfo();
}

function gSelectedIds() {
  return [...document.querySelectorAll('#gBody tr')]
    .filter(tr => { const c = tr.querySelector('.g-sel'); return c && c.checked; })
    .map(tr => parseInt(tr.dataset.id, 10));
}

function gUpdateSelInfo() {
  const n = gSelectedIds().length;
  $('gSelInfo').textContent = n ? `${n} mục đã chọn` : '';
}

function gToggleAll(on) {
  document.querySelectorAll('#gBody .g-sel').forEach(c => { c.checked = on; });
  gUpdateSelInfo();
}

async function gApi(path, payload) {
  const res = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload || {}),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'lỗi');
  return data;
}

async function gAdd() {
  const zh = $('gNewZh').value.trim();
  const vi = $('gNewVi').value.trim();
  if (!zh || !vi) { alert('Nhập cả chữ Hán và bản dịch.'); return; }
  try {
    const data = await gApi('/api/glossary/global', { zh, vi, enabled: true });
    gSetCounts(data.counts);
    $('gNewZh').value = ''; $('gNewVi').value = '';
    $('gNewZh').focus();
    gLoad();
  } catch (e) { alert('Không thêm được: ' + (e.message || e)); }
}

// Lưu khi sửa inline zh/vi (onblur). Bỏ qua nếu không đổi.
async function gSaveRow(id) {
  const tr = document.querySelector(`#gBody tr[data-id="${id}"]`);
  if (!tr) return;
  const it = _gItems.find(x => x.id === id);
  const zh = tr.querySelector('.g-zh').value.trim();
  const vi = tr.querySelector('.g-vi').value.trim();
  if (!it || (zh === it.zh && vi === it.vi)) return;
  if (!zh || !vi) { gLoad(); return; }   // rỗng → khôi phục
  try {
    const data = await gApi('/api/glossary/global', { id, zh, vi });
    gSetCounts(data.counts);
    if (data.item) { it.zh = data.item.zh; it.vi = data.item.vi; }
    // zh có thể đã gộp vào mục khác → tải lại cho chắc
    gLoad();
  } catch (e) { alert('Không lưu được: ' + (e.message || e)); gLoad(); }
}

async function gToggleOne(id, enabled) {
  try {
    const data = await gApi('/api/glossary/global/toggle', { ids: [id], enabled });
    gSetCounts(data.counts);
    const it = _gItems.find(x => x.id === id);
    if (it) it.enabled = enabled;
    gRender();
  } catch (e) { alert('Không đổi được: ' + (e.message || e)); gLoad(); }
}

async function gBulkEnable(enabled) {
  const ids = gSelectedIds();
  if (!ids.length) { alert('Chưa chọn mục nào.'); return; }
  try {
    const data = await gApi('/api/glossary/global/toggle', { ids, enabled });
    gSetCounts(data.counts);
    gLoad();
  } catch (e) { alert('Lỗi: ' + (e.message || e)); }
}

async function gDeleteOne(id) {
  if (!confirm('Xoá cặp từ này khỏi kho dùng chung?')) return;
  try {
    const data = await gApi('/api/glossary/global/delete', { ids: [id] });
    gSetCounts(data.counts);
    gLoad();
  } catch (e) { alert('Không xoá được: ' + (e.message || e)); }
}

async function gBulkDelete() {
  const ids = gSelectedIds();
  if (!ids.length) { alert('Chưa chọn mục nào.'); return; }
  if (!confirm(`Xoá ${ids.length} cặp đã chọn?`)) return;
  try {
    const data = await gApi('/api/glossary/global/delete', { ids });
    gSetCounts(data.counts);
    gLoad();
  } catch (e) { alert('Lỗi: ' + (e.message || e)); }
}

async function gImport() {
  const path = $('gImportPath').value.trim();
  if (!path) { alert('Nhập đường dẫn file glossary.txt hoặc thư mục bộ.'); return; }
  const enabled = $('gImportEnabled').checked;
  if (!confirm(`Import cặp từ "${path}" vào kho dùng chung`
      + (enabled ? ' (duyệt luôn)?' : ' (chờ duyệt)?'))) return;
  try {
    const data = await gApi('/api/glossary/global/import', { path, enabled });
    gSetCounts(data.counts);
    alert(`Đã import ${data.imported}/${data.total_pairs} cặp.`);
    $('gImportPath').value = '';
    gLoad();
  } catch (e) { alert('Import lỗi: ' + (e.message || e)); }
}

// ── AI dịch lại (model cũ dịch sai) ────────────────────────────────────────
// Lấy cấu hình LLM từ tab Dịch (cùng SPA): ưu tiên custom_openai (MIT), fallback
// llm_base_url / model mặc định. Backend tự mặc định ollama nếu để trống.
function gLlmConfig() {
  const gv = id => { const el = document.getElementById(id); return el ? (el.value || '').trim() : ''; };
  return {
    api_base: gv('tMITCustomOpenAiApiBase') || gv('tLlmBaseUrl'),
    api_key:  gv('tMITCustomOpenAiApiKey'),
    model:    gv('tMITOllamaModel') || gv('tModel'),
  };
}

let _gRtItems = [];   // đề xuất AI đang xem trước

// Bước 1: hỏi AI đề xuất (KHÔNG ghi DB) → mở modal xem trước.
async function gRetranslate(ids) {
  if (!ids || !ids.length) { alert('Chưa chọn mục nào để dịch lại.'); return; }
  const cfg = gLlmConfig();
  const prev = $('gSelInfo').textContent;
  $('gSelInfo').textContent = '🤖 Đang nhờ AI dịch lại…';
  try {
    const data = await gApi('/api/glossary/global/retranslate', { ids, ...cfg });
    $('gSelInfo').textContent = prev;
    _gRtItems = data.suggestions || [];
    if (!_gRtItems.length) { alert('AI không trả về đề xuất nào.'); return; }
    const nChange = _gRtItems.filter(s => s.changed).length;
    const nMissing = data.missing || 0;
    // Không có gì đổi → không mở modal, báo thẳng (kèm chẩn đoán nếu AI dịch hụt).
    if (nChange === 0) {
      if (nMissing) {
        alert(`AI không dịch được ${nMissing}/${_gRtItems.length} mục `
          + `(model trả thiếu hoặc sai định dạng). Thử lại với ÍT mục hơn, `
          + `hoặc kiểm tra model/API ở tab Dịch.`);
      } else {
        alert(`AI giữ nguyên tất cả ${_gRtItems.length} mục — không có gì cần sửa.`);
      }
      return;
    }
    gRtOpen(cfg, nChange, nMissing);
  } catch (e) {
    $('gSelInfo').textContent = prev;
    alert('AI dịch lại lỗi: ' + (e.message || e));
  }
}

function gBulkRetranslate() { gRetranslate(gSelectedIds()); }

// ── Modal xem trước ────────────────────────────────────────────────────────
function gRtOpen(cfg, nChange, nMissing) {
  // Chỉ hiện các mục CÓ ĐỔI lên đầu cho gọn; mục AI bỏ sót gắn nhãn ⚠ để biết.
  $('gRtInfo').textContent =
    `${_gRtItems.length} mục · ${nChange} có đổi`
    + (nMissing ? ` · ⚠ ${nMissing} AI bỏ sót` : '')
    + ` · model ${cfg.model || 'mặc định'}`;
  // Sắp mục có đổi lên trước.
  const ordered = [..._gRtItems].sort((a, b) => (b.changed ? 1 : 0) - (a.changed ? 1 : 0));
  $('gRtBody').innerHTML = ordered.map(s => {
    const warn = s.missing
      ? ' <span title="AI không trả về mục này" style="color:var(--warn,#e0a33e)">⚠</span>' : '';
    return `
    <tr data-id="${s.id}" style="border-top:1px solid var(--border);${s.changed ? '' : 'opacity:.6'}">
      <td style="padding:6px 8px"><input type="checkbox" class="g-rt-sel" ${s.changed ? 'checked' : ''}></td>
      <td style="padding:6px 8px;font-size:.86rem">${gEsc(s.zh)}${warn}</td>
      <td style="padding:6px 8px;color:var(--text-muted)">${gEsc(s.old)}</td>
      <td style="padding:6px 8px"><input class="g-rt-vi" value="${gEsc(s.new)}"
        style="width:100%;padding:5px 7px;border:1px solid var(--border);border-radius:6px;background:var(--surface2,#26262f);color:var(--text);font-size:.84rem${s.changed ? ';border-color:var(--accent,#6a9)' : ''}"></td>
    </tr>`;
  }).join('');
  if ($('gRtAll')) $('gRtAll').checked = nChange > 0;
  $('gRtModal').style.display = 'flex';
}

function gRtClose() { $('gRtModal').style.display = 'none'; _gRtItems = []; }

function gRtToggleAll(on) {
  // "Chọn tất cả mục có đổi": chỉ tick các dòng mà AI thật sự đổi bản dịch.
  [...document.querySelectorAll('#gRtBody tr')].forEach(tr => {
    const c = tr.querySelector('.g-rt-sel');
    if (!c) return;
    const it = _gRtItems.find(x => x.id === parseInt(tr.dataset.id, 10));
    c.checked = on && !!(it && it.changed);
  });
}

// Bước 2: áp dụng các mục đã tick — ghi qua route upsert (giữ trạng thái duyệt).
async function gRtApply() {
  const rows = [...document.querySelectorAll('#gRtBody tr')].filter(tr => {
    const c = tr.querySelector('.g-rt-sel');
    return c && c.checked;
  });
  if (!rows.length) { alert('Chưa tick mục nào để áp dụng.'); return; }
  const btn = $('gRtApply');
  btn.disabled = true; const lbl = btn.textContent; btn.textContent = 'Đang lưu…';
  let ok = 0, fail = 0;
  for (const tr of rows) {
    const id = parseInt(tr.dataset.id, 10);
    const it = _gRtItems.find(x => x.id === id);
    const vi = tr.querySelector('.g-rt-vi').value.trim();
    if (!it || !vi) { fail++; continue; }
    try {
      await gApi('/api/glossary/global', { id, zh: it.zh, vi });
      ok++;
    } catch (e) { fail++; }
  }
  btn.disabled = false; btn.textContent = lbl;
  gRtClose();
  gLoad();
  alert(`Đã lưu ${ok} mục${fail ? `, ${fail} lỗi` : ''}.`);
}

async function gDedup() {
  if (!confirm('Gộp các cặp có chữ Hán trùng nhau?')) return;
  try {
    const data = await gApi('/api/glossary/global/dedup', {});
    gSetCounts(data.counts);
    alert(`Đã gộp ${data.merged} cặp trùng. Còn lại ${data.total} cặp.`);
    gLoad();
  } catch (e) { alert('Không gộp được: ' + (e.message || e)); }
}
</script>
