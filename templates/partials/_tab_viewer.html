<!-- ── Viewer tab ─────────────────────────────────────────────────────────── -->
<div id="tab-viewer" class="viewer-layout" style="display:none">

  <!-- ── Left: controls ────────────────────────────────────────────────── -->
  <div class="left-col">

    <!-- Folder picker -->
    <div class="card" style="margin-bottom:12px">
      <div class="card-header">Thư mục ảnh</div>
      <div class="card-body">
        <div class="field">
          <label>Chọn thư mục</label>
          <div class="folder-row">
            <input type="text" id="vFolderInput" placeholder="D:\Comic\Chapter-1"
                   onkeydown="if(event.key==='Enter') vOpen()" />
            <button class="btn btn-ghost btn-browse" onclick="openFolderBrowser('vFolderInput')">📁 Chọn…</button>
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="vOpen()">📖 Mở thư mục</button>
      </div>
    </div>

    <!-- View mode -->
    <div class="card" style="margin-bottom:12px">
      <div class="card-header">Chế độ xem</div>
      <div class="card-body">
        <div class="viewer-mode-btns">
          <button id="vModeScroll" class="viewer-mode-btn active" onclick="vSetMode('scroll')">
            <span class="vm-icon">↕</span>
            <b>Cuộn dọc</b>
            <small>Tất cả ảnh liên tục</small>
          </button>
          <button id="vModePage" class="viewer-mode-btn" onclick="vSetMode('page')">
            <span class="vm-icon">📄</span>
            <b>Theo trang</b>
            <small>Chuyển từng ảnh</small>
          </button>
        </div>
      </div>
    </div>

    <!-- Jump to page (page mode only) -->
    <div id="vGoPageCard" class="card" style="display:none">
      <div class="card-header">Chuyển trang nhanh</div>
      <div class="card-body">
        <div class="folder-row">
          <input type="number" id="vGoPageInput" min="1" placeholder="Số trang…"
                 onkeydown="if(event.key==='Enter') vGoToPage()" />
          <button class="btn btn-ghost" onclick="vGoToPage()">Đến</button>
        </div>
        <div class="field-hint" id="vGoPageHint" style="margin-top:4px">Nhập số trang rồi nhấn Enter</div>
      </div>
    </div>

    <!-- Keyboard hint (page mode only) -->
    <div id="vKeyHint" class="card" style="display:none">
      <div class="card-body" style="padding:10px 14px">
        <div style="font-size:.72rem;color:var(--text-muted);line-height:1.9">
          <div>⬅ / ⬆  — Trang trước</div>
          <div>➡ / ⬇  — Trang sau</div>
          <div>Click ảnh trái/phải để chuyển</div>
        </div>
      </div>
    </div>

  </div><!-- end left -->

  <!-- ── Right: reader panel ───────────────────────────────────────────── -->
  <div class="viewer-panel">

    <!-- toolbar -->
    <div class="viewer-toolbar">
      <span class="viewer-folder-name" id="vFolderName">Chưa chọn thư mục</span>
      <span class="stat-pill stat-blue" id="vImgCount" style="flex-shrink:0">0 ảnh</span>
      <select id="vFitSelect" class="viewer-fit-select" onchange="vApplyFit()">
        <option value="width">↔ Vừa chiều rộng</option>
        <option value="contain">⛶ Vừa màn hình</option>
        <option value="original">1:1 Kích thước gốc</option>
      </select>
    </div>

    <!-- scroll view -->
    <div id="vScrollView" class="viewer-scroll fit-width">
      <div class="viewer-empty">
        <span style="font-size:2.5rem;opacity:.35">🖼</span>
        <span>Chọn thư mục và nhấn 📖 Mở thư mục</span>
      </div>
    </div>

    <!-- page view -->
    <div id="vPageView" class="viewer-page-wrap" style="display:none">
      <div class="vpage-img-area fit-contain" id="vPageImgArea" onclick="vPageClick(event)">
        <div class="viewer-empty" id="vPageEmpty">
          <span style="font-size:2.5rem;opacity:.35">🖼</span>
          <span>Chưa có ảnh</span>
        </div>
        <img id="vPageImg" src="" alt="" style="display:none" />
      </div>
      <div class="vpage-controls">
        <button class="vpage-nav-btn" id="vPrevBtn" onclick="vPrev()" disabled title="Trang trước (←)">‹ Trước</button>
        <div class="vpage-counter">
          <span id="vPageNum">—</span>
          <span style="color:var(--text-muted);margin:0 5px">/</span>
          <span id="vPageTotal">—</span>
        </div>
        <button class="vpage-nav-btn" id="vNextBtn" onclick="vNext()" disabled title="Trang sau (→)">Sau ›</button>
      </div>
    </div>

  </div><!-- end viewer panel -->

</div><!-- end viewer tab -->
