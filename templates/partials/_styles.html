<style>
    /* ── CSS Variables ─────────────────────────────────────────────────── */
    :root {
      --bg:           #0d1117;
      --surface:      #161b22;
      --surface2:     #1c2230;
      --border:       #30363d;
      --text:         #e6edf3;
      --text-muted:   #7d8590;
      --accent:       #58a6ff;
      --accent-dim:   rgba(88,166,255,.15);
      --green:        #3fb950;
      --green-dim:    rgba(63,185,80,.15);
      --red:          #f85149;
      --red-dim:      rgba(248,81,73,.15);
      --yellow:       #d29922;
      --yellow-dim:   rgba(210,153,34,.15);
      --cyan:         #39d353;
      --radius:       10px;
      --mono:         'Cascadia Code','Fira Code','Consolas',monospace;
    }
    [data-theme="light"] {
      --bg:           #f6f8fa;
      --surface:      #ffffff;
      --surface2:     #f0f3f6;
      --border:       #d0d7de;
      --text:         #1f2328;
      --text-muted:   #656d76;
      --accent:       #0969da;
      --accent-dim:   rgba(9,105,218,.1);
      --green:        #1a7f37;
      --green-dim:    rgba(26,127,55,.1);
      --red:          #cf222e;
      --red-dim:      rgba(207,34,46,.1);
      --yellow:       #9a6700;
      --yellow-dim:   rgba(154,103,0,.1);
    }

    /* ── Reset ──────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px 20px 32px;
      font-size: 14px;
      line-height: 1.5;
    }
    a { color: var(--accent); }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .brand-icon {
      width: 32px; height: 32px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .brand-accent { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .badge-version {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-theme {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 5px 12px;
      cursor: pointer;
      font-size: 0.78rem;
      color: var(--text-muted);
      transition: all .15s;
      font-family: inherit;
    }
    .btn-theme:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
      max-width: 1300px;
      margin: 0 auto;
      align-items: start;
    }
    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .log-panel { min-height: 360px; }
    }

    /* ── Card ───────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-body { padding: 16px; }

    /* ── Form ───────────────────────────────────────────────────────────── */
    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 5px;
    }
    .field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 11px;
      color: var(--text);
      font-size: 0.88rem;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      font-family: inherit;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .field input::placeholder { color: var(--text-muted); opacity: .55; }
    .field input[type="number"] { font-variant-numeric: tabular-nums; }

    .field select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 11px;
      font-family: inherit;
      font-size: .88rem;
      cursor: pointer;
      outline: none;
      transition: border-color .15s;
    }
    .field select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    .field select.sm { padding: 6px 8px; font-size: .82rem; }

    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .grid-4 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 10px;
    }
    .field-hint {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── Divider ────────────────────────────────────────────────────────── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

    /* ── Preset chips ───────────────────────────────────────────────────── */
    .presets { display: flex; gap: 7px; flex-wrap: wrap; }
    .chip {
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    /* ── Buttons ────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 7px;
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all .15s;
      font-family: inherit;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }
    .btn-primary  { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover:not(:disabled)  { filter: brightness(1.12); }
    .btn-danger   { background: var(--red);    color: #fff; border-color: var(--red); }
    .btn-danger:hover:not(:disabled)   { filter: brightness(1.1); }
    .btn-ghost    { background: transparent; border-color: var(--border); color: var(--text-muted); }
    .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }

    .action-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    /* ── Progress ───────────────────────────────────────────────────────── */
    .progress-wrap { margin-top: 16px; }
    .prog-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      margin-bottom: 6px;
    }
    .prog-label { color: var(--text-muted); }
    .prog-pct   { font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
    .prog-track {
      height: 5px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 99px;
      width: 0%;
      transition: width .35s ease;
    }
    .stats-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .stat-pill {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
      font-variant-numeric: tabular-nums;
    }
    .stat-blue   { background: var(--accent-dim);  color: var(--accent); }
    .stat-green  { background: var(--green-dim);   color: var(--green);  }
    .stat-red    { background: var(--red-dim);     color: var(--red);    }

    /* ── Failed URL list ───────────────────────────────────────────────────────── */
    .failed-url-list {
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface2);
    }
    .failed-url-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      font-size: .72rem;
      font-family: var(--mono);
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
    }
    .failed-url-item:last-child { border-bottom: none; }
    .fi-idx { color: var(--red); font-weight: 700; flex-shrink: 0; min-width: 2.8em; }
    .fi-url { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Status badge ───────────────────────────────────────────────────── */
    .status-row { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }
    .status-dot.running  { background: var(--green);  animation: blink 1.2s infinite; }
    .status-dot.done     { background: var(--green); }
    .status-dot.error    { background: var(--red); }
    .status-dot.stopped  { background: var(--yellow); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── Details/summary adv toggle ─────────────────────────────────────── */
    details summary::-webkit-details-marker { display: none; }
    details > div { animation: fadeIn .15s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

    /* ── Log panel ──────────────────────────────────────────────────────── */
    .log-panel { display: flex; flex-direction: column; min-height: 520px; }
    .log-body {
      flex: 1;
      background: #010409;
      padding: 12px 14px;
      font-family: var(--mono);
      font-size: 0.78rem;
      line-height: 1.7;
      overflow-y: auto;
      min-height: 460px;
      max-height: 72vh;
    }
    .log-line { white-space: pre-wrap; word-break: break-all; color: #8b949e; }
    .log-line.ok     { color: #3fb950; }
    .log-line.fail   { color: #f85149; }
    .log-line.warn   { color: #d29922; }
    .log-line.done   { color: #58a6ff; font-weight: 600; }
    .log-line.sep    { color: #21262d; }
    .log-line.info   { color: #58a6ff; }
    .log-line.skip   { color: #6e7681; font-style: italic; }
    .log-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.8rem;
      opacity: .5;
      gap: 6px;
    }

    /* ── Folder row ─────────────────────────────────────────────────────── */
    .folder-row { display: flex; gap: 6px; align-items: stretch; }
    .folder-row input { flex: 1; min-width: 0; }
    .btn-browse { padding: 7px 12px; font-size: 0.82rem; flex-shrink: 0; }

    /* ── URL Tag Input ──────────────────────────────────────────────────── */
    .url-tag-box {
      min-height: 80px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-content: flex-start;
      cursor: text;
      transition: border-color .15s, box-shadow .15s;
    }
    .url-tag-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .url-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: var(--accent-dim);
      border: 1px solid rgba(88,166,255,.35);
      border-radius: 99px;
      padding: 2px 5px 2px 10px;
      font-size: 0.75rem;
      color: var(--accent);
      font-family: var(--mono);
      max-width: 100%;
      overflow: hidden;
      animation: tagIn .12s ease;
    }
    [data-theme="light"] .url-tag { border-color: rgba(9,105,218,.35); }
    @keyframes tagIn { from { opacity:0; transform:scale(.85); } to { opacity:1; transform:none; } }
    .url-tag-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 230px;
    }
    .url-tag-rm {
      cursor: pointer;
      opacity: .55;
      font-size: 0.9rem;
      padding: 0 3px;
      flex-shrink: 0;
      background: none;
      border: none;
      color: inherit;
      font-family: inherit;
      line-height: 1;
      border-radius: 50%;
    }
    .url-tag-rm:hover { opacity: 1; background: rgba(88,166,255,.25); }
    .url-tag-input {
      flex: 1;
      min-width: 200px;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.88rem;
      padding: 3px 5px;
      font-family: inherit;
    }
    .url-tag-input::placeholder { color: var(--text-muted); opacity: .55; }
    .url-tag-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 4px;
    }
    .url-tag-footer .field-hint { flex: 1; }
    kbd {
      font-family: var(--mono);
      font-size: .72em;
      padding: 1px 4px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
    }

    /* ── Tab strip ──────────────────────────────────────────────────────── */
    .tabs-strip {
      display: flex;
      gap: 2px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      background: none; border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      padding: 9px 20px;
      cursor: pointer;
      font-size: 0.88rem; font-weight: 600;
      color: var(--text-muted);
      font-family: inherit;
      transition: color .15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Check badges ───────────────────────────────────────────────────── */
    .check-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px; margin-top: 6px;
    }
    .check-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.75rem; padding: 5px 8px;
      border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface2);
    }
    .check-item .ci-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      background: var(--text-muted);
    }
    .check-item.ok  .ci-dot { background: var(--green); }
    .check-item.bad .ci-dot { background: var(--red);   }
    .check-item .ci-label { color: var(--text-muted); }
    .check-item .ci-val   { color: var(--text); font-weight: 600; margin-left: auto; font-size: 0.7rem; }

    /* ── Preview grid ───────────────────────────────────────────────────── */
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
      padding: 10px;
    }
    .preview-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .15s, transform .1s;
      background: var(--surface2);
      position: relative;
    }
    .preview-card:hover { border-color: var(--accent); transform: scale(1.02); }
    .preview-card img  { width: 100%; height: 90px; object-fit: cover; display: block; }
    .preview-card .pc-name {
      font-size: 0.68rem; padding: 4px 6px;
      color: var(--text-muted); overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .preview-card .pc-del-btn {
      display: none;
      position: absolute; top: 4px; right: 4px;
      background: rgba(0,0,0,.6); color: #fff;
      border: none; border-radius: 4px;
      padding: 2px 5px; font-size: .75rem;
      cursor: pointer; line-height: 1.2;
    }
    .preview-card:hover .pc-del-btn { display: block; }

    /* ── Lightbox ───────────────────────────────────────────────────────── */
    .lightbox {
      display: none; position: fixed; inset: 0;
      z-index: 2000; align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lb-backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.90);
    }
    /* image wrapper */
    .lb-img-wrap {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      max-width: 92vw; max-height: 88vh;
      overflow: hidden;
      cursor: grab;
    }
    .lb-img-wrap.dragging { cursor: grabbing; }
    #lightboxImg {
      max-width: 100%; max-height: 88vh;
      border-radius: 4px;
      transform-origin: center center;
      transition: transform .15s ease;
      user-select: none; pointer-events: none;
    }
    /* nav arrows */
    .lb-nav {
      position: absolute; top: 50%; z-index: 2;
      transform: translateY(-50%);
      background: rgba(0,0,0,.45); color: #fff;
      border: none; border-radius: 50%;
      width: 44px; height: 44px;
      font-size: 1.8rem; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .lb-nav:hover { background: rgba(255,255,255,.2); }
    .lb-nav:disabled { opacity: .2; cursor: default; }
    .lb-prev { left: 14px; }
    .lb-next { right: 14px; }
    /* top bar */
    .lb-topbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 3;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,.65), transparent);
    }
    .lb-counter {
      font-size: .8rem; color: rgba(255,255,255,.75);
      flex-shrink: 0;
    }
    .lb-name {
      flex: 1; font-size: .78rem; color: rgba(255,255,255,.65);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .lb-close {
      background: none; border: none; color: #fff;
      font-size: 1.4rem; cursor: pointer; line-height: 1;
      padding: 2px 4px; flex-shrink: 0;
    }
    /* bottom toolbar */
    .lb-toolbar {
      position: absolute; bottom: 0; left: 50%; z-index: 3;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px 12px;
      background: linear-gradient(to top, rgba(0,0,0,.65), transparent);
      border-radius: 0 0 8px 8px;
    }
    .lb-tool {
      background: rgba(255,255,255,.12); color: #fff;
      border: 1px solid rgba(255,255,255,.18); border-radius: 6px;
      padding: 5px 12px; font-size: .82rem; cursor: pointer;
      transition: background .12s;
      min-width: 36px;
    }
    .lb-tool:hover { background: rgba(255,255,255,.25); }
    .lb-zoom-reset { min-width: 52px; font-variant-numeric: tabular-nums; }
    .lb-del { color: #ff7b7b; border-color: rgba(255,100,100,.35); }
    .lb-del:hover { background: rgba(220,40,40,.35); }
    .lb-sep { width: 1px; height: 20px; background: rgba(255,255,255,.2); margin: 0 4px; }

    /* ── Folder browser modal ───────────────────────────────────────────── */
    .fb-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }
    .fb-overlay.open { display: flex; }
    .fb-dialog {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: min(580px, 96vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
      overflow: hidden;
    }
    .fb-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
    }
    .fb-title { font-weight: 700; font-size: 0.9rem; }
    .fb-close {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 1.1rem; line-height: 1;
      padding: 2px 6px; border-radius: 4px;
    }
    .fb-close:hover { background: var(--surface2); color: var(--text); }
    .fb-breadcrumb {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--surface2);
      font-family: var(--mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }
    .fb-body {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    .fb-entry {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: 0.85rem;
      border-bottom: 1px solid transparent;
      transition: background .1s;
      user-select: none;
    }
    .fb-entry:hover { background: var(--surface2); }
    .fb-entry .fb-icon { font-size: 1rem; flex-shrink: 0; }
    .fb-entry .fb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
