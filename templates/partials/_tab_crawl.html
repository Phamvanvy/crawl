<!-- ── Crawl tab ───────────────────────────────────────────────────────── -->
<div id="tab-crawl" class="layout">

  <!-- ── Left: Config ──────────────────────────────────────────────────── -->
  <div class="left-col">

    <!-- URL -->
    <div class="card" style="margin-bottom:12px">
      <div class="card-header" data-i18n="crawl.src.header">Nguồn crawl</div>
      <div class="card-body">
        <div class="field">
          <label data-i18n="crawl.url.label">URL trang web</label>
          <div class="folder-row">
            <input type="url" id="urlInput" placeholder="https://example.com/gallery"
                   oninput="onUrlChange()" />
            <button class="btn btn-ghost btn-browse" onclick="clearUrl()" title="Xóa URL"
                    data-i18n="crawl.url.clear" data-i18n-title="crawl.url.clear.title">✕ Xóa</button>
          </div>
          <div class="field-hint" id="urlHint"></div>
        </div>
        <div class="field">
          <label data-i18n="crawl.folder.label">Thư mục lưu ảnh</label>
          <div class="folder-row">
            <input type="text" id="folderInput" value="output"
                   placeholder="output  hoặc  D:\Ảnh\crawl"
                   data-i18n-ph="crawl.folder.ph" />
            <button class="btn btn-ghost btn-browse" onclick="openFolderBrowser('folderInput')" title="Chọn thư mục trên máy"
                    data-i18n="btn.browse" data-i18n-title="btn.browse.title">
              📁 Chọn…
            </button>
          </div>
          <div class="field-hint" data-i18n="crawl.folder.hint">Đường dẫn tuyệt đối hoặc tương đối từ nơi chạy script.</div>
        </div>
      </div>
    </div>

    <!-- Options -->
    <div class="card" style="margin-bottom:12px">
      <div class="card-header" data-i18n="crawl.adv.header">Tùy chọn nâng cao</div>
      <div class="card-body">
        <div class="grid-4">
          <div class="field">
            <label>Delay (s)</label>
            <input type="number" id="delayInput" value="0.3" min="0" max="10" step="0.1" />
          </div>
          <div class="field">
            <label data-i18n="crawl.workers.label">Luồng tải</label>
            <input type="number" id="workersInput" value="4" min="1" max="32" step="1" />
          </div>
          <div class="field">
            <label>Timeout (s)</label>
            <input type="number" id="timeoutInput" value="20" min="5" max="300" step="1" />
          </div>
          <div class="field">
            <label data-i18n="crawl.retries.label">Thử lại</label>
            <input type="number" id="retriesInput" value="3" min="0" max="10" step="1" />
          </div>
        </div>

        <hr class="divider" />

        <div class="field" style="margin-bottom:0">
          <label data-i18n="crawl.presets.label">Cài đặt nhanh</label>
          <div class="presets">
            <button class="chip" onclick="applyPreset('fast')"  data-i18n="preset.fast"  data-i18n-title="preset.fast.title"  title="delay=0.1s, 8 luồng, timeout=15s">⚡ Nhanh</button>
            <button class="chip" onclick="applyPreset('safe')"  data-i18n="preset.safe"  data-i18n-title="preset.safe.title"  title="delay=1.0s, 2 luồng, timeout=30s">🛡 An toàn</button>
            <button class="chip" onclick="applyPreset('heavy')" data-i18n="preset.heavy" data-i18n-title="preset.heavy.title" title="delay=0.2s, 12 luồng, timeout=20s">💪 Mạnh</button>
            <button class="chip" onclick="applyPreset('lazy')"  data-i18n="preset.lazy"  data-i18n-title="preset.lazy.title"  title="delay=2.0s, 1 luồng, timeout=60s">🐢 Nhẹ nhàng</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Actions & Progress -->
    <div class="card">
      <div class="card-body">
        <div class="action-row">
          <button class="btn btn-primary"  id="startBtn" onclick="startCrawl()" data-i18n="btn.start">▶ Bắt đầu</button>
          <button class="btn btn-danger"   id="stopBtn"  onclick="stopCrawl()" disabled data-i18n="btn.stop">■ Dừng</button>
          <button class="btn btn-ghost"    onclick="saveConfig()" title="Lưu cấu hình vào trình duyệt"
                  data-i18n="btn.save_config" data-i18n-title="btn.save_config.title">💾 Lưu</button>
          <button class="btn btn-ghost"    onclick="resetConfig()" title="Khôi phục mặc định"
                  data-i18n-title="btn.reset_config.title">↺</button>
        </div>
        <label class="cb-item" style="margin-top:10px; gap:12px" title="Số lần tự động retry ảnh lỗi sau khi done (0 = tắt)">
          <input type="checkbox" id="autoRetryChk" onchange="onAutoRetryChkChange()" />
          ↺ Tự động retry ảnh lỗi &nbsp;
          <input type="number" id="autoRetryTimes" value="3" min="1" max="20" step="1"
                 style="width:52px; padding:2px 6px; font-size:.82rem; border-radius:5px;
                        border:1px solid var(--border); background:var(--surface);
                        color:var(--text); text-align:center"
                 title="Số lần retry tối đa" />
          lần
        </label>

        <div class="progress-wrap" id="progressWrap" style="display:none">
          <hr class="divider" />
          <div class="prog-header">
            <span class="prog-label" id="progLabel">Đang tải…</span>
            <span class="prog-pct"   id="progPct">0%</span>
          </div>
          <div class="prog-track">
            <div class="prog-fill" id="progFill"></div>
          </div>
          <div class="stats-row">
            <span class="stat-pill stat-blue"  id="statTotal">Tổng: 0</span>
            <span class="stat-pill stat-green" id="statOk">✓ 0</span>
            <span class="stat-pill stat-red"   id="statFail">✗ 0</span>
          </div>
        </div>

        <div class="status-row">
          <div class="status-dot" id="statusDot"></div>
          <span class="status-text" id="statusText" data-i18n="status.ready">Sẵn sàng</span>
        </div>
      </div>
    </div>

    <!-- ── Failed images panel ─────────────────────────────────────────────── -->
    <div class="card" id="failedPanel" style="display:none; margin-top:12px; border-color:var(--red-dim)">
      <div class="card-header" style="gap:8px">
        <span style="color:var(--red)">&#10007; Ảnh tải thất bại</span>
        <span id="failedCountBadge" class="stat-pill stat-red"></span>
      </div>
      <div class="card-body">
        <div class="action-row" style="margin-bottom:8px">
          <button class="btn btn-danger" id="retryFailedBtn" onclick="retryFailed()">
            ↺ Thử lại ảnh lỗi
          </button>
          <button class="btn btn-ghost" style="font-size:.75rem" onclick="copyFailedUrls()"
                  title="Sao chép toàn bộ URL lỗi ra clipboard">&#128203; Copy URL</button>
          <button class="btn btn-ghost" id="toggleFailedBtn" style="font-size:.75rem"
                  onclick="toggleFailedList()">&#9658; Xem danh sách</button>
        </div>
        <div id="failedUrlWrap" style="display:none; margin-top:4px">
          <div class="failed-url-list" id="failedUrlList"></div>
        </div>
      </div>
    </div>

  </div><!-- end left -->

  <!-- ── Right: Log ────────────────────────────────────────────────────── -->
  <div class="right-col">
    <div class="card log-panel">
      <div class="card-header">
        <span data-i18n="crawl.log.header">Nhật ký thời gian thực</span>
        <button class="btn btn-ghost" style="padding:3px 10px;font-size:.75rem" onclick="clearLog()"
                data-i18n="btn.clear_log">🗑 Xóa</button>
      </div>
      <div class="log-body" id="logBox">
        <div class="log-empty">
          <span>▋</span>
          <span data-i18n="crawl.log.empty">Nhập URL và nhấn ▶ Bắt đầu</span>
        </div>
      </div>
    </div>
  </div>

</div><!-- end crawl tab -->
