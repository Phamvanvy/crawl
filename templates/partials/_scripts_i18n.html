let _lang = 'vi';

function tr(key, ...args) {
  const v = (TRANSLATIONS[_lang] ?? TRANSLATIONS.vi)[key] ?? TRANSLATIONS.vi[key] ?? key;
  return typeof v === 'function' ? v(...args) : v;
}

function applyLang(lang) {
  _lang = lang;
  localStorage.setItem('lang', lang);
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = tr(el.dataset.i18n);
    if (v !== el.dataset.i18n) el.textContent = v;
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const v = tr(el.dataset.i18nPh);
    if (v !== el.dataset.i18nPh) el.placeholder = v;
  });
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    const v = tr(el.dataset.i18nTitle);
    if (v !== el.dataset.i18nTitle) el.title = v;
  });
  $('tabBtnCrawl').textContent     = tr('tab.crawl');
  $('tabBtnTranslate').textContent = tr('tab.translate');
  $('tabBtnViewer').textContent    = tr('tab.viewer');
  const isDark = document.documentElement.dataset.theme === 'dark';
  $('themeBtn').textContent = isDark ? tr('theme.light') : tr('theme.dark');
  $('langSelect').value = lang;
  document.documentElement.lang = lang;
}

function loadLang() {
  applyLang(localStorage.getItem('lang') || 'vi');
}
