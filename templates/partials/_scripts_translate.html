<script>
// true = job dịch của tab này đang xếp hàng chờ job khác (vd tab khác) chạy xong.
let _tQueuedWait = false;

async function tPoll() {
  let data;
  try {
    const res = await fetch(`/api/translate/logs?from=${_tCursor}`);
    if (!res.ok) return;
    data = await res.json();
  } catch { return; }

  // Batch log: gom tất cả log entries vào DocumentFragment 1 lần để tránh nhiều reflow
  const box  = $('tLogBox');
  const frag = document.createDocumentFragment();
  let   hasLog = false;
  for (const entry of data.logs) {
    if (entry.type === 'log') {
      const empty = !hasLog && box.querySelector('.log-empty');
      if (empty) empty.remove();
      const line = document.createElement('div');
      line.className = 'log-line' + (entry.cls || (' ' + tClassify(entry.msg)) || '');
      line.textContent = entry.msg;
      frag.appendChild(line);
      hasLog = true;
    }
    if (entry.type === 'progress') tShowProgress(entry.done, entry.total);
    if (entry.type === 'done') {
      tShowStats(entry.success, entry.failed);
      $('tProgFill').style.width  = '100%';
      $('tProgPct').textContent   = '100%';
      $('tProgLabel').textContent = tr('prog.done_translate', entry.success + entry.failed);
      if (entry.output_dir) { _tOutputDir = entry.output_dir; tRefreshPreview(); }
    }
  }
  if (hasLog) {
    box.appendChild(frag);
    // Xóa node cũ khi vượt giới hạn (tránh DOM phình to)
    while (box.children.length > T_LOG_MAX_DOM) box.removeChild(box.firstChild);
    box.scrollTop = box.scrollHeight;
  }
  _tCursor = data.total;

  // Job của tab này từng phải xếp hàng → hàng đợi cạn nghĩa là nó đã tới lượt chạy.
  if (_tQueuedWait && data.state.running && !(data.state.queue > 0)) {
    _tQueuedWait = false;
    tSetStatus(tr('status.t.running'), 'running');
  }

  if (!data.state.running && _tRunning) {
    _tRunning = false;
    _tQueuedWait = false;
    tSetCrawling(false);
    tStopPolling();
    const s = data.state.status;
    if (s === 'done') {
      tSetStatus(tr('status.t.done_fmt', data.state.success, data.state.failed), 'done');
      // Luôn đưa progress về 100% từ state thực
      tShowProgress(data.state.total, data.state.total);
      tShowStats(data.state.success, data.state.failed);
      $('tProgFill').style.width  = '100%';
      $('tProgPct').textContent   = '100%';
      $('tProgLabel').textContent = tr('prog.done_translate', data.state.total);
      if (data.state.failed > 0) {
        let rounds;
        if (_tAutoRetryRoundsLeft > 0) {
          rounds = _tAutoRetryRoundsLeft;
        } else if ($('tAutoRetryChk').checked) {
          rounds = Math.max(1, parseInt(getVal('tAutoRetryTimes'), 10) || 1);
        } else {
          rounds = 0;
        }
        tLoadFailed(rounds);
      } else {
        $('tFailedPanel').style.display = 'none';
        _tAutoRetryRoundsLeft = 0;
      }
    }
    if (s === 'error')   tSetStatus(tr('status.t.error'), 'error');
    if (s === 'stopped') tSetStatus(tr('status.t.stopped'), 'stopped');
  }
}

// ── MIT API key hints ─────────────────────────────────────────────────────────

  deepl:        'Cần env: DEEPL_AUTH_KEY=xxx  (DeepL Pro hoặc Free)',
  openai:       'Cần env: OPENAI_API_KEY=sk-xxx  |  OPENAI_MODEL=chatgpt-4o-latest (tùy chọn)',
  deepseek:     'Cần env: DEEPSEEK_API_KEY=xxx  |  DEEPSEEK_MODEL=deepseek-chat',
  gemini:       'Cần env: GEMINI_API_KEY=xxx  |  GEMINI_MODEL=gemini-1.5-flash-002',
  youdao:       'Cần env: YOUDAO_APP_KEY=xxx  YOUDAO_SECRET_KEY=xxx',
  baidu:        'Cần env: BAIDU_APP_ID=xxx  BAIDU_SECRET_KEY=xxx',
  caiyun:       'Cần env: CAIYUN_TOKEN=xxx',
  groq:         'Cần env: GROQ_API_KEY=xxx  |  GROQ_MODEL=mixtral-8x7b-32768',
  sakura:       'Cần env: SAKURA_API_BASE=http://127.0.0.1:8080/v1',
  custom_openai:'Cần API Base: CUSTOM_OPENAI_API_BASE=http://localhost:11434/v1 (Ollama) hoặc http://127.0.0.1:8080/v1 (LM Studio), và model qwen2.5-vl-7b-instruct',
};

function onMITTranslatorChange() {
  const val  = getVal('tMITTranslator');
  const hint = $('mitApiKeyHint');
  if (MIT_API_KEYS[val]) {
    hint.textContent = '🔑 ' + MIT_API_KEYS[val];
    hint.classList.add('visible');
  } else {
    hint.classList.remove('visible');
  }
  const modelField = $('mitOllamaModelField');
  const baseField  = $('mitCustomOpenAiBaseField');
  const keyField   = $('mitCustomOpenAiKeyField');
  if (modelField) modelField.style.display = val === 'custom_openai' ? '' : 'none';
  if (baseField)  baseField.style.display  = val === 'custom_openai' ? '' : 'none';
  if (keyField)   keyField.style.display   = val === 'custom_openai' ? '' : 'none';
}

function mitPreset(mode) {
  const set = (id, v) => { const el = $(id); if (el) el.value = v; };
  const setSel = (id, v) => { const el = $(id); if (el) el.value = v; };
  const chk = (id, v) => { const el = $(id); if (el) el.checked = !!v; };
  if (mode === 'cg') {
    // CG / Visual Novel: dùng default detector (craft không phát hiện được subtitle CG)
    setSel('tMITDetector', '');          // default detector
    setSel('tMITInpainter', 'lama_large');
    setSel('tMITUpscale',   '');         // Tắt
    setSel('tMITUpscaler',  'waifu2x');
    setSel('tMITInpaintSize', '2560');   // inpaint res cao cho nét
    setSel('tMITInpaintPrec', '');       // default (bf16)
    setSel('tMITDetSize',  '2560');
    set('tMITMaskDil',  '0');
    set('tMITUnclip',   '2.3');
    set('tMITBoxThr',   '0.2');
    set('tMITTextThr',  '0.2');
    chk('tMITDetGamma', true);
    chk('tMITDetInvert', true);
    chk('tMITDetRotate', false);
    chk('tMITDetAutoRotate', false);
    setSel('tMITOcr', '48px_ctc');
    set('tMITOcrProb',  '0.5');
    set('tMITFontOfs',  '-4');
    document.getElementById('tMITFontOfsVal') && (document.getElementById('tMITFontOfsVal').textContent = '-4');
    set('tMITFontMin',  '');             // auto
    set('tMITFontFixed','');             // auto — MIT tự scale theo bbox
    set('tMITFontColor','');             // auto
  } else if (mode === 'manga_sfx') {
    // Manga nét / SFX — CÔNG THỨC ĐÃ KIỂM CHỨNG bắt được cả SFX vẽ tay (vd 哈啊):
    // detect chạy trên ảnh upscale ×2 (waifu2x) nên nhìn rõ nét SFX; threshold thấp + gamma.
    // Chậm hơn (~1.5 phút/ảnh, tốn VRAM) nhưng bắt sạch hơn.
    setSel('tMITDetector', '');          // default detector (ăn đứt ctd khi có upscale)
    setSel('tMITInpainter', 'lama_large');
    setSel('tMITUpscale',   '2');        // ★ MẤU CHỐT: upscale ×2 mở khóa detect SFX
    setSel('tMITUpscaler',  'waifu2x');  // waifu2x giữ halftone (KHÔNG dùng esrgan cho manga)
    setSel('tMITInpaintSize', '2560');   // ảnh đã ×2 → inpaint res cao cho nét
    setSel('tMITInpaintPrec', '');
    setSel('tMITDetSize',  '2560');
    set('tMITMaskDil',  '10');           // dilation nhẹ phủ kín viền chữ/SFX
    set('tMITUnclip',   '1.4');
    set('tMITBoxThr',   '0.1');          // nhạy: bắt SFX/chữ nghệ thuật
    set('tMITTextThr',  '0.1');
    chk('tMITDetGamma', true);
    chk('tMITDetInvert', true);          // đảo màu: bắt chữ sáng trên nền tối
    chk('tMITDetRotate', false);
    chk('tMITDetAutoRotate', false);
    setSel('tMITOcr', '48px_ctc');
    set('tMITOcrProb',  '0.5');          // box/text thr thấp → lọc OCR đọc bậy
    set('tMITFontOfs',  '-10');          // offset ÂM: thu chữ cho khớp bubble nhỏ
    document.getElementById('tMITFontOfsVal') && (document.getElementById('tMITFontOfsVal').textContent = '-10');
    set('tMITFontMin',  '');
    set('tMITFontFixed','');
    set('tMITFontColor','');
  } else if (mode === 'manga') {
    // Manga: chữ trong bong bóng, inpaint lama_large, detect size 2560
    setSel('tMITDetector', '');
    setSel('tMITInpainter', 'lama_large');
    setSel('tMITUpscale',   '');
    setSel('tMITUpscaler',  'waifu2x');
    setSel('tMITInpaintSize', '');
    setSel('tMITInpaintPrec', '');
    setSel('tMITDetSize',  '2560');
    set('tMITMaskDil',  '0');
    set('tMITUnclip',   '2.3');
    set('tMITBoxThr',   '0.7');
    set('tMITTextThr',  '0.5');
    chk('tMITDetGamma', false);
    chk('tMITDetInvert', false);
    chk('tMITDetRotate', false);
    chk('tMITDetAutoRotate', false);
    setSel('tMITOcr', '');
    set('tMITOcrProb',  '');             // thr cao → ít rác, dùng default 0.2
    set('tMITFontOfs',  '4');            // offset DƯƠNG: chữ to lấp đầy bubble; fit-loop tự thu nếu tràn
    document.getElementById('tMITFontOfsVal') && (document.getElementById('tMITFontOfsVal').textContent = '4');
    set('tMITFontMin',  '');
    set('tMITFontFixed','');
    set('tMITFontColor','');
  } else {
    // Reset về trống (dùng MIT defaults)
    setSel('tMITDetector', '');
    setSel('tMITInpainter', '');
    setSel('tMITUpscale', '');
    setSel('tMITUpscaler', '');
    setSel('tMITInpaintSize', '');
    setSel('tMITInpaintPrec', '');
    setSel('tMITDetSize', '');
    set('tMITMaskDil',  '');
    set('tMITUnclip',   '');
    set('tMITBoxThr',   '');
    set('tMITTextThr',  '');
    chk('tMITDetGamma', false);
    chk('tMITDetInvert', false);
    chk('tMITDetRotate', false);
    chk('tMITDetAutoRotate', false);
    setSel('tMITOcr', '');
    set('tMITOcrProb',  '');
    set('tMITFontOfs',  '');
    set('tMITFontMin',  '');
    set('tMITFontFixed','');
    set('tMITFontColor','');
    setSel('tMITNarrowWide', '');
    set('tMITNarrowFontCap', '');
  }
}

function onBackendChange() {
  const isMIT = document.querySelector('input[name="tBackend"]:checked').value === 'mit';
  $('tMITOptions').style.display    = isMIT ? '' : 'none';
  $('tOllamaOptions').style.display = isMIT ? 'none' : '';
}

function openSettingsModal() {
  $('settingsOverlay').classList.add('open');
  if (typeof _modalOpened === 'function') _modalOpened(document.querySelector('#settingsOverlay .settings-dialog'));
}

function closeSettingsModal() {
  $('settingsOverlay').classList.remove('open');
  if (typeof _modalClosed === 'function') _modalClosed();
}

function switchSettingsTab(tabId) {
  document.querySelectorAll('.settings-tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.modal-tab-btn').forEach(b => b.classList.remove('active'));
  const pane = $(tabId);
  if (pane) pane.classList.add('active');
  const btn = document.querySelector(`.modal-tab-btn[data-tab="${tabId}"]`);
  if (btn) btn.classList.add('active');
}

// ── Start / Stop translate ────────────────────────────────────────────────────
async function tStart() {
  const input_dir        = getVal('tInputDir').trim();
  const output_dir       = getVal('tOutputDir').trim();
  const _mitOllamaModel  = (getVal('tMITOllamaModel') || '').trim();
  const use_gpu          = $('tUseGpu').checked;
  const src_lang         = getVal('tSrcLang');
  const translation_style = getVal('tTranslationStyle') || 'modern';
  const llm_api_type      = getVal('tLlmApiType') || 'ollama';
  const llm_base_url      = (getVal('tLlmBaseUrl') || '').trim();
  const backend          = document.querySelector('input[name="tBackend"]:checked').value;
  const mit_translator   = getVal('tMITTranslator');
  const mit_target_lang  = getVal('tMITTargetLang');
  const mit_detector     = getVal('tMITDetector');
  const mit_inpainter    = getVal('tMITInpainter');
  const mit_inpaint_size = getVal('tMITInpaintSize');
  const mit_inpaint_prec = getVal('tMITInpaintPrec');
  const mit_upscale      = getVal('tMITUpscale');
  const mit_upscaler     = getVal('tMITUpscaler');
  const mit_det_size     = getVal('tMITDetSize');
  const mit_mask_dil     = $('tMITMaskDil').value;
  const mit_unclip       = $('tMITUnclip').value;
  const mit_box_thr      = $('tMITBoxThr') ? $('tMITBoxThr').value : '';
  const mit_text_thr     = $('tMITTextThr') ? $('tMITTextThr').value : '';
  const mit_det_gamma    = $('tMITDetGamma') ? $('tMITDetGamma').checked : false;
  const mit_det_invert   = $('tMITDetInvert') ? $('tMITDetInvert').checked : false;
  const mit_det_rotate   = $('tMITDetRotate') ? $('tMITDetRotate').checked : false;
  const mit_det_auto_rotate = $('tMITDetAutoRotate') ? $('tMITDetAutoRotate').checked : false;
  const mit_ocr          = getVal('tMITOcr');
  const mit_ocr_prob     = $('tMITOcrProb') ? $('tMITOcrProb').value : '';
  const mit_font_ofs     = $('tMITFontOfs').value;
  const mit_font_min     = $('tMITFontMin').value;
  const mit_font_fixed   = $('tMITFontFixed').value;
  const mit_font_color   = $('tMITFontColor').value;
  const mit_narrow_wide  = getVal('tMITNarrowWide');
  const mit_narrow_fcap  = $('tMITNarrowFontCap') ? $('tMITNarrowFontCap').value : '';
  const mit_verbose      = $('tMITVerbose').checked;
  const mit_skip_no_text = $('tMITSkipNoText').checked;
  const mit_overwrite    = $('tMITOverwrite').checked;
  const mit_custom_api_base = getVal('tMITCustomOpenAiApiBase');
  const mit_custom_api_key  = getVal('tMITCustomOpenAiApiKey');
  const cpu_priority     = getVal('tCpuPriority') || 'below_normal';
  const inpainter        = getVal('tInpainter') || 'opencv';
  const overwrite        = $('tOverwrite') ? $('tOverwrite').checked : false;
  const font_scale       = parseFloat($('tFontScale') ? $('tFontScale').value : '0.75') || 0.75;
  const image_quality    = parseInt($('tImageQuality') ? $('tImageQuality').value : '95', 10) || 95;
  const model            = (backend === 'mit' && getVal('tMITTranslator') === 'custom_openai' && _mitOllamaModel)
                           ? _mitOllamaModel
                           : (getVal('tModel').trim() || 'qwen3:8b');

  const images = (typeof _tSelImages !== 'undefined') ? [..._tSelImages] : [];

  if (!input_dir) { tAddLog(tr('alert.no_input_dir'), 'warn'); return; }
  if (images.length) tAddLog(`🖼 Chỉ dịch ${images.length} ảnh đã chọn.`, 'info');

  _tCursor    = 0;
  _tRunning   = true;
  _tOutputDir = output_dir;
  tClearLog();
  if ($('tProgressCard')) $('tProgressCard').style.display = '';
  if ($('tProgressWrap'))  $('tProgressWrap').style.display = '';
  tShowProgress(0, 0);
  tShowStats(0, 0);
  tSetStatus(tr('status.t.running'), 'running');
  tSetCrawling(true);
  tStartPolling();

  let res, json;
  try {
    res  = await fetch('/api/translate/start', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        input_dir, output_dir, images, model, use_gpu, src_lang, backend, translation_style,
        llm_api_type, llm_base_url,
        mit_translator, mit_target_lang,
        mit_detector, mit_inpainter, mit_inpaint_size, mit_inpaint_prec, mit_upscale, mit_upscaler, mit_det_size,
        mit_mask_dil, mit_unclip, mit_box_thr, mit_text_thr,
        mit_det_gamma, mit_det_invert, mit_det_rotate, mit_det_auto_rotate, mit_ocr, mit_ocr_prob,
        mit_font_ofs, mit_font_min, mit_font_fixed, mit_font_color, mit_narrow_wide, mit_narrow_fcap,
        mit_custom_api_base, mit_custom_api_key,
        mit_verbose, mit_skip_no_text, mit_overwrite,
        inpainter, overwrite, font_scale, image_quality, cpu_priority,
      }),
    });
    json = await res.json();
  } catch (e) {
    tAddLog(tr('alert.no_conn', e), 'fail');
    tSetCrawling(false); tStopPolling(); _tRunning = false; return;
  }

  if (!res.ok) {
    tAddLog(`⚠  ${json.error || 'Lỗi không xác định'}`, 'warn');
    tSetStatus(tr('status.t.error'), 'error');
    tSetCrawling(false); tStopPolling(); _tRunning = false;
  } else {
    if (json.output_dir) _tOutputDir = json.output_dir;
    if (json.queued) {           // server đang dịch job khác → job này chờ tới lượt
      _tQueuedWait = true;
      tSetStatus(tr('status.t.queued'), 'running');
    }
  }
}

async function tStop() {
  try { await fetch('/api/translate/stop', { method: 'POST' }); } catch {}
  tSetStatus(tr('status.t.stopping'), 'stopped');
}

// ── Translate auto-retry ──────────────────────────────────────────────────────
let _tAutoRetryRoundsLeft = 0;

function onTAutoRetryChkChange() {
  $('tAutoRetryTimes').disabled = !$('tAutoRetryChk').checked;
}

async function tLoadFailed(roundsLeft = 0) {
  let data;
  try {
    const res = await fetch('/api/translate/failed');
    data = await res.json();
  } catch { data = { images: [] }; }
  const imgs = data.images || [];
  const panel = $('tFailedPanel');
  const badge = $('tFailedBadge');
  if (!imgs.length) { panel.style.display = 'none'; if ($('tProgressCard') && $('tProgressWrap') && $('tProgressWrap').style.display === 'none') $('tProgressCard').style.display = 'none'; return; }
  badge.textContent = tr('badge.failed', imgs.length);
  if ($('tProgressCard')) $('tProgressCard').style.display = '';
  panel.style.display = '';
  if (roundsLeft > 0) {
    tAddLog(`↺  Auto-retry dịch (còn ${roundsLeft} lần)…`, 'info');
    _tAutoRetryRoundsLeft = roundsLeft - 1;
    tRetryFailed();
  } else {
    _tAutoRetryRoundsLeft = 0;
  }
}

async function tRetryFailed() {
  const model     = getVal('tModel').trim() || 'qwen3:8b';
  const use_gpu   = $('tUseGpu').checked;
  const src_lang  = getVal('tSrcLang');
  const inpainter = getVal('tInpainter') || 'opencv';

  $('tFailedPanel').style.display = 'none';
  _tCursor  = 0;
  _tRunning = true;
  tClearLog();
  if ($('tProgressCard')) $('tProgressCard').style.display = '';
  if ($('tProgressWrap'))  $('tProgressWrap').style.display = '';
  tShowProgress(0, 0);
  tShowStats(0, 0);
  tSetStatus(tr('status.t.running'), 'running');
  tSetCrawling(true);
  tStartPolling();

  let res, json;
  try {
    res  = await fetch('/api/translate/retry_failed', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ model, use_gpu, src_lang, inpainter }),
    });
    json = await res.json();
  } catch (e) {
    tAddLog(tr('alert.no_conn', e), 'fail');
    tSetCrawling(false); tStopPolling(); _tRunning = false; return;
  }
  if (!res.ok) {
    tAddLog(`⚠  ${json.error || 'Lỗi không xác định'}`, 'warn');
    tSetStatus(tr('status.t.error'), 'error');
    tSetCrawling(false); tStopPolling(); _tRunning = false;
  } else {
    if (json.output_dir) _tOutputDir = json.output_dir;
    if (json.queued) {           // server đang dịch job khác → retry này chờ tới lượt
      _tQueuedWait = true;
      tSetStatus(tr('status.t.queued'), 'running');
    }
  }
}

// ── Sort & pin (dùng chung cho lưới "Ảnh đã dịch" + editor "Vùng chữ thủ công") ─
// Cho phép xem nhanh những ảnh VỪA dịch/sửa (sort "Mới sửa" theo mtime) thay vì A→Z,
// và GHIM ảnh cần kiểm/sửa lên đầu kèm dấu 📌. Lựa chọn lưu trong localStorage.
const IMG_SORT_KEY    = 'imgSort.v1';    // {preview:'name'|'recent', region:'name'|'recent'}
const IMG_PIN_KEY     = 'imgPins.v1';    // { <scope>: [name, …] }
const IMG_PINONLY_KEY = 'imgPinOnly.v1'; // {preview:bool, region:bool}

function _imgLoadJSON(key, def) { try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; } }
function _imgSaveJSON(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

function getSortMode(which) { const s = _imgLoadJSON(IMG_SORT_KEY, {}); return s[which] === 'recent' ? 'recent' : 'name'; }
function setSortMode(which, mode) { const s = _imgLoadJSON(IMG_SORT_KEY, {}); s[which] = (mode === 'recent' ? 'recent' : 'name'); _imgSaveJSON(IMG_SORT_KEY, s); }

function getPinOnly(which) { return !!_imgLoadJSON(IMG_PINONLY_KEY, {})[which]; }
function setPinOnly(which, on) { const s = _imgLoadJSON(IMG_PINONLY_KEY, {}); s[which] = !!on; _imgSaveJSON(IMG_PINONLY_KEY, s); }

// Pin theo BỘ ẢNH (thư mục nguồn) — bản gốc & bản dịch DÙNG CHUNG 1 danh sách ghim,
// nên ghim ở "Vùng chữ thủ công" (ảnh gốc) thì lưới "Ảnh đã dịch" cũng thấy, và ngược lại.
function pinScope() {
  return getVal('tInputDir').trim() || _tOutputDir || getVal('tOutputDir').trim() || '';
}

function _pinList(scope) { const p = _imgLoadJSON(IMG_PIN_KEY, {}); return (scope && Array.isArray(p[scope])) ? p[scope] : []; }
function isPinned(scope, name) { return _pinList(scope).includes(name); }
function togglePin(scope, name) {
  if (!scope) return;
  const p = _imgLoadJSON(IMG_PIN_KEY, {});
  const arr = Array.isArray(p[scope]) ? p[scope] : [];
  const i = arr.indexOf(name);
  if (i >= 0) arr.splice(i, 1); else arr.push(name);
  if (arr.length) p[scope] = arr; else delete p[scope];
  _imgSaveJSON(IMG_PIN_KEY, p);
  refreshPinViews();   // đồng bộ ngay cả 2 panel trong trang này
}

// Ảnh "mới" = vừa dịch/sửa trong vòng 1 tiếng (mtime giây). Đánh dấu 🆕 để tiện kiểm tra.
const IMG_FRESH_SEC = 3600;
function isFresh(mtime) { return !!mtime && (Date.now() / 1000 - mtime) <= IMG_FRESH_SEC; }

// Lọc (chỉ ghim) rồi sắp xếp: ảnh ghim luôn lên đầu, trong mỗi nhóm theo mode đã chọn.
function prepareImageList(images, scope, mode, pinOnly) {
  const pins = new Set(_pinList(scope));
  let list = images;
  if (pinOnly) list = images.filter(im => pins.has(im.name));
  return list.slice().sort((a, b) => {
    const pa = pins.has(a.name), pb = pins.has(b.name);
    if (pa !== pb) return pa ? -1 : 1;
    if (mode === 'recent') { const d = (b.mtime || 0) - (a.mtime || 0); if (d) return d; }
    return String(a.name).localeCompare(String(b.name), undefined, { numeric: true, sensitivity: 'base' });
  });
}

// Cập nhật trạng thái bật/tắt của 2 nút lọc "chỉ ghim".
function _syncPinOnlyButtons() {
  const pb = $('tPreviewPinOnly');
  if (pb) { const on = getPinOnly('preview'); pb.classList.toggle('active', on); pb.setAttribute('aria-pressed', on); }
  const rb = $('rePinOnly');
  if (rb) { const on = getPinOnly('region'); rb.classList.toggle('active', on); rb.setAttribute('aria-pressed', on); }
}

// Vẽ lại MỌI nơi đang hiển thị ghim khi danh sách ghim đổi (dù đổi ở đâu / tab nào):
//   1) lưới "Ảnh đã dịch"   2) editor "✏️ Vùng chữ thủ công"   3) lightbox/so sánh gốc.
function refreshPinViews() {
  if (typeof tApplyPreviewSort === 'function' && _tPreviewAllImages.length) tApplyPreviewSort();
  const ov = $('regionOverlay');
  if (ov && ov.classList.contains('open') && typeof reRenderSide === 'function' && _reImages.length) reRenderSide();
  const lb = $('lightbox');
  if (lb && lb.classList.contains('open') && typeof _lbRenderPin === 'function') _lbRenderPin();
}

// Đồng bộ GIỮA CÁC TAB trình duyệt: tab khác đổi ghim/sort → tab này tự cập nhật.
window.addEventListener('storage', (e) => {
  if (e.key === IMG_PIN_KEY || e.key === IMG_PINONLY_KEY || e.key === IMG_SORT_KEY) {
    const ps = $('tPreviewSort'); if (ps) ps.value = getSortMode('preview');
    const rs = $('reSort');       if (rs) rs.value = getSortMode('region');
    _syncPinOnlyButtons();
    refreshPinViews();
  }
});

// ── Preview ───────────────────────────────────────────────────────────────────
const T_PREVIEW_PER_PAGE = 60;
let _tPreviewAllImages   = [];   // cache: TOÀN BỘ ảnh từ server (không bị lọc)
let _tPreviewView        = [];   // danh sách đã lọc+sắp xếp đang hiển thị/phân trang
let _tPreviewPage        = 0;    // current page (0-based)
let _tFocusedPreviewImg  = null; // { path, name, cardEl } — for Delete key

async function tRefreshPreview() {
  // Ưu tiên giá trị trong ô input (người dùng có thể vừa sửa tay thư mục xuất);
  // chỉ fallback về _tOutputDir (đường dẫn server tự tạo _vi sau khi chạy) khi ô để trống.
  const folder = getVal('tOutputDir').trim() || _tOutputDir;
  if (!folder) return;
  _tOutputDir = folder;
  let data;
  try {
    const res = await fetch('/api/translate/preview?folder=' + encodeURIComponent(folder) + '&limit=0');
    data = await res.json();
  } catch { return; }
  _tPreviewAllImages = data.images || [];
  tApplyPreviewSort();   // lọc + sắp xếp rồi render trang đầu
}

// Tính lại danh sách hiển thị (lọc ghim + sắp xếp) từ cache — KHÔNG làm hỏng cache.
function tRebuildPreviewView() {
  _tPreviewView = prepareImageList(_tPreviewAllImages, pinScope(), getSortMode('preview'), getPinOnly('preview'));
  tRenderPreviewPage();
}

// Như trên nhưng quay về trang 1 (khi đổi sort/lọc/ghim).
function tApplyPreviewSort() {
  _tPreviewPage = 0;
  tRebuildPreviewView();
}

function tOnPreviewSortChange(mode) {
  setSortMode('preview', mode);
  tApplyPreviewSort();
}

function tTogglePreviewPin(name) {
  togglePin(pinScope(), name);   // togglePin tự gọi refreshPinViews() → đồng bộ cả 2 panel
}

function tTogglePreviewPinOnly() {
  setPinOnly('preview', !getPinOnly('preview'));
  _syncPinOnlyButtons();
  tApplyPreviewSort();
}

function tRenderPreviewPage() {
  const total     = _tPreviewView.length;
  const hasCache  = _tPreviewAllImages.length > 0;
  const pageCount = Math.max(1, Math.ceil(total / T_PREVIEW_PER_PAGE));
  if (_tPreviewPage >= pageCount) _tPreviewPage = Math.max(0, pageCount - 1);
  const start    = _tPreviewPage * T_PREVIEW_PER_PAGE;
  const end      = Math.min(start + T_PREVIEW_PER_PAGE, total);
  const pageImgs = _tPreviewView.slice(start, end);
  const grid     = $('tPreviewGrid');
  const pager    = $('tPreviewPager');
  _tFocusedPreviewImg = null;

  if (!total) {
    // Phân biệt: thật sự trống vs đang bật lọc "chỉ ghim" mà chưa ghim ảnh nào.
    const msg = (hasCache && getPinOnly('preview')) ? tr('pin.none') : tr('t.preview.empty');
    grid.innerHTML      = `<div class="log-empty" style="height:120px;grid-column:1/-1"><span>🖼</span><span>${escHtml(msg)}</span></div>`;
    pager.style.display = 'none';
    return;
  }

  // Build lightbox list + cards in one pass
  const lbList = [];
  const origDir   = getVal('tInputDir').trim();   // thư mục nguồn để so sánh ảnh gốc
  const scope     = pinScope();
  const frag   = document.createDocumentFragment();
  for (let i = 0; i < pageImgs.length; i++) {
    const img  = pageImgs[i];
    const pinned = isPinned(scope, img.name);
    const fresh  = isFresh(img.mtime);
    const card = document.createElement('div');
    card.className = 'preview-card' + (pinned ? ' pinned' : '') + (fresh ? ' fresh' : '');
    card.tabIndex  = 0;
    const full  = '/api/translate/image?path=' + encodeURIComponent(img.path)
                + '&rev=' + encodeURIComponent(img.mtime || '0');
    const thumb = full + '&thumb=256';
    // Lightbox mở ảnh full-res; lưới chỉ tải thumbnail nhỏ (tránh decode hàng chục ảnh full).
    lbList.push({ src: full, path: img.path, name: img.name, cardEl: card, origDir });
    card.innerHTML = `<img src="${thumb}" loading="lazy" decoding="async" alt="${escHtml(img.name)}" width="130" height="90" />`
                   + (fresh ? `<span class="pc-fresh" title="${escHtml(tr('fresh.hint'))}" data-i18n-title="fresh.hint">🆕</span>` : '')
                   + `<div class="pc-name">${escHtml(img.name)}</div>`
                   + `<button class="pc-pin-btn${pinned ? ' on' : ''}" title="${escHtml(tr(pinned ? 'pin.undo' : 'pin.do'))}">📌</button>`
                   + `<button class="pc-del-btn" title="Xóa ảnh này để dịch lại (Del)">🗑</button>`;
    card.querySelector('img').addEventListener('click', ((_i) => () => openLightbox(lbList, _i))(i));
    card.querySelector('.pc-pin-btn').addEventListener('click', e => {
      e.stopPropagation();
      tTogglePreviewPin(img.name);
    });
    card.querySelector('.pc-del-btn').addEventListener('click', e => {
      e.stopPropagation();
      tDeletePreviewImg(img.path, img.name, card);
    });
    // Track focused card for Delete key
    card.addEventListener('mouseenter', () => { _tFocusedPreviewImg = { path: img.path, name: img.name, cardEl: card }; });
    card.addEventListener('focus',      () => { _tFocusedPreviewImg = { path: img.path, name: img.name, cardEl: card }; });
    frag.appendChild(card);
  }
  grid.innerHTML = '';
  grid.appendChild(frag);

  // Pagination bar
  if (pageCount > 1) {
    pager.style.display                = 'flex';
    $('tPreviewPageInfo').textContent  = `${_tPreviewPage + 1} / ${pageCount}`;
    $('tPreviewTotalInfo').textContent = `(${total} ảnh)`;
    $('tPreviewPrevBtn').disabled      = _tPreviewPage === 0;
    $('tPreviewNextBtn').disabled      = _tPreviewPage >= pageCount - 1;
  } else {
    pager.style.display = 'none';
  }
}

function tPreviewPrevPage() {
  if (_tPreviewPage > 0) {
    _tPreviewPage--;
    tRenderPreviewPage();
    $('tPreviewGrid').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function tPreviewNextPage() {
  const pageCount = Math.ceil(_tPreviewView.length / T_PREVIEW_PER_PAGE);
  if (_tPreviewPage < pageCount - 1) {
    _tPreviewPage++;
    tRenderPreviewPage();
    $('tPreviewGrid').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

async function tDeleteAllPreviewImages() {
  const folder = _tOutputDir || getVal('tOutputDir').trim();
  if (!folder) { alert('Chưa có thư mục output.'); return; }
  const total = _tPreviewAllImages.length;
  if (total === 0) { alert('Không có ảnh nào để xóa.'); return; }
  if (!confirm(`Xóa TẤT CẢ ${total} ảnh đã dịch trong thư mục output?\n→ Chạy lại sẽ dịch lại toàn bộ.`)) return;
  let deleted = 0, failed = 0;
  for (const img of [..._tPreviewAllImages]) {
    try {
      const res = await fetch('/api/viewer/delete', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: img.path }),
      });
      if (res.ok) deleted++; else failed++;
    } catch { failed++; }
  }
  _tPreviewAllImages = [];
  _tPreviewPage = 0;
  tRebuildPreviewView();
  tAddLog(`🗑 Đã xóa ${deleted} ảnh${failed ? `, lỗi ${failed}` : ''}.`, deleted > 0 ? 'ok' : 'warn');
}

async function tDeletePreviewImg(path, name, cardEl) {
  if (!confirm(`Xóa ảnh đã dịch "${name}"?\n→ Chạy lại sẽ dịch lại ảnh này.`)) return;
  try {
    const res  = await fetch('/api/viewer/delete', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path }),
    });
    const data = await res.json();
    if (!res.ok) { alert(`Lỗi: ${data.error || 'không xóa được'}`); return; }
  } catch (e) {
    alert(`Lỗi kết nối: ${e}`); return;
  }
  // Remove from cache and re-render current page
  const idx = _tPreviewAllImages.findIndex(img => img.path === path);
  if (idx >= 0) _tPreviewAllImages.splice(idx, 1);
  if (_tFocusedPreviewImg && _tFocusedPreviewImg.path === path) _tFocusedPreviewImg = null;
  tRebuildPreviewView();
}

// ── Image selection (translate a subset) ────────────────────────────────────
let _tSelImages = new Set();   // selected filenames; empty = whole folder
let _tImgList   = [];          // [{name, path, count}]

async function tLoadImageList() {
  const dir  = getVal('tInputDir').trim();
  const grid = $('tImgPickGrid');
  if (!dir) { grid.innerHTML = '<div class="re-pill" style="grid-column:1/-1;padding:6px;color:var(--warn)">Chưa chọn thư mục nguồn.</div>'; return; }
  grid.innerHTML = '<div class="re-pill" style="grid-column:1/-1;padding:6px">Đang tải…</div>';
  let data;
  try {
    const res = await fetch('/api/regions/list?dir=' + encodeURIComponent(dir));
    data = await res.json();
    if (!res.ok) throw new Error(data.error || 'lỗi');
  } catch (e) {
    grid.innerHTML = `<div class="re-pill" style="grid-column:1/-1;padding:6px;color:var(--red)">Lỗi: ${escHtml(String(e.message || e))}</div>`;
    return;
  }
  _tImgList = data.images || [];
  const names = new Set(_tImgList.map(i => i.name));
  _tSelImages = new Set([..._tSelImages].filter(n => names.has(n)));  // drop stale
  tRenderImgPick();
}

function tRenderImgPick() {
  const grid = $('tImgPickGrid');
  if (!_tImgList.length) {
    grid.innerHTML = '<div class="re-pill" style="grid-column:1/-1;padding:6px">Thư mục không có ảnh.</div>';
    tUpdImgSelCount(); return;
  }
  const frag = document.createDocumentFragment();
  for (const im of _tImgList) {
    const sel  = _tSelImages.has(im.name);
    const cell = document.createElement('div');
    cell.className = 'img-pick' + (sel ? ' sel' : '');
    const thumb = '/api/translate/image?path=' + encodeURIComponent(im.path) + '&thumb=120';
    cell.innerHTML = `<input type="checkbox" class="ip-check" ${sel ? 'checked' : ''} />`
      + (im.count ? `<span class="ip-badge" title="${im.count} vùng thủ công">✏${im.count}</span>` : '')
      + `<img src="${thumb}" loading="lazy" alt="">`
      + `<div class="ip-name" title="${escHtml(im.name)}">${escHtml(im.name)}</div>`;
    const toggle = () => {
      if (_tSelImages.has(im.name)) _tSelImages.delete(im.name); else _tSelImages.add(im.name);
      tRenderImgPick();
    };
    cell.addEventListener('click', e => { if (e.target.classList.contains('ip-check')) return; toggle(); });
    cell.querySelector('.ip-check').addEventListener('change', toggle);
    frag.appendChild(cell);
  }
  grid.innerHTML = '';
  grid.appendChild(frag);
  tUpdImgSelCount();
}

function tSelectAllImages(on) {
  _tSelImages = on ? new Set(_tImgList.map(i => i.name)) : new Set();
  tRenderImgPick();
}

function tUpdImgSelCount() {
  const n = _tSelImages.size, m = _tImgList.length;
  const el = $('tImgSelCount');
  if (el) el.textContent = n ? `Đang chọn ${n}/${m} ảnh` : 'Không tích = cả thư mục';
}

// ── Glossary per-truyện (tên / xưng hô / cảnh giới — tự học) ────────────────
function _tGlossaryCountText(d) {
  return `${d.terms || 0} mục khoá · ${d.notes || 0} ghi chú`
    + (d.exists === false ? ' · (chưa có file — sẽ tạo khi dịch hoặc khi Lưu)' : '');
}

async function tLoadGlossary() {
  const dir   = getVal('tInputDir').trim();
  const pathEl  = $('tGlossaryPath');
  const cntEl   = $('tGlossaryCount');
  const textEl  = $('tGlossaryText');
  if (!dir) { pathEl.textContent = 'Chưa chọn thư mục nguồn.'; cntEl.textContent = ''; return; }
  pathEl.textContent = 'Đang tải…'; cntEl.textContent = '';
  try {
    const res = await fetch('/api/translate/glossary?input_dir=' + encodeURIComponent(dir));
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'lỗi');
    textEl.value = data.content || '';
    pathEl.textContent = data.path || '';
    cntEl.textContent = _tGlossaryCountText(data);
  } catch (e) {
    pathEl.textContent = 'Lỗi: ' + String(e.message || e);
    cntEl.textContent = '';
  }
}

async function tSaveGlossary() {
  const dir  = getVal('tInputDir').trim();
  const cntEl  = $('tGlossaryCount');
  const textEl = $('tGlossaryText');
  if (!dir) { $('tGlossaryPath').textContent = 'Chưa chọn thư mục nguồn.'; return; }
  cntEl.textContent = 'Đang lưu…';
  try {
    const res = await fetch('/api/translate/glossary', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ input_dir: dir, content: textEl.value }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'lỗi');
    $('tGlossaryPath').textContent = data.path || '';
    cntEl.textContent = '✔ Đã lưu — ' + _tGlossaryCountText(data);
  } catch (e) {
    cntEl.textContent = 'Lỗi: ' + String(e.message || e);
  }
}

// Gọi khi thư mục nguồn vừa đổi → auto tải lại danh sách ảnh (và editor nếu mở).
function onSourceFolderChanged() {
  _tSelImages = new Set();
  tLoadImageList();
  if ($('regionOverlay') && $('regionOverlay').classList.contains('open')) {
    openRegionEditor();  // reload editor cho thư mục mới
  }
}
// Gõ tay đường dẫn rồi rời ô cũng auto tải lại.
document.addEventListener('DOMContentLoaded', () => {
  const el = $('tInputDir');
  if (el) el.addEventListener('change', onSourceFolderChanged);
  // Khôi phục lựa chọn sắp xếp + lọc đã lưu cho các dropdown/nút.
  const ps = $('tPreviewSort'); if (ps) ps.value = getSortMode('preview');
  const rs = $('reSort');       if (rs) rs.value = getSortMode('region');
  _syncPinOnlyButtons();
});

// ── Manual region editor ────────────────────────────────────────────────────
let _reDir       = '';     // source folder
let _reImages    = [];     // [{name, path, count}]
let _reName      = '';     // current image filename
let _reRegions   = [];     // [{x,y,w,h}] normalized 0..1
let _reMode      = 'merge';
let _reSel       = -1;     // selected region index
let _reDrag      = null;   // {x0,y0} normalized while drawing

async function openRegionEditor() {
  const dir = getVal('tInputDir').trim();
  if (!dir) { tAddLog(tr('alert.no_input_dir') || '⚠ Chưa chọn thư mục nguồn.', 'warn'); return; }
  if (dir !== _reDir) {   // thư mục mới → reset trạng thái cũ
    _reName = ''; _reRegions = []; _reSel = -1;
    $('reStage').style.display = 'none';
    $('reEmpty').style.display = '';
  }
  _reDir = dir;
  $('reDirLabel').textContent = dir;
  $('regionOverlay').classList.add('open');
  await reLoadList();
}

function closeRegionEditor() {
  $('regionOverlay').classList.remove('open');
}

async function reLoadList() {
  const side = $('reSide');
  side.innerHTML = '<div class="re-pill" style="padding:8px">Đang tải…</div>';
  let data;
  try {
    const res = await fetch('/api/regions/list?dir=' + encodeURIComponent(_reDir));
    data = await res.json();
    if (!res.ok) throw new Error(data.error || 'lỗi');
  } catch (e) {
    side.innerHTML = `<div class="re-pill" style="padding:8px;color:var(--red)">Lỗi: ${escHtml(String(e.message || e))}</div>`;
    return;
  }
  _reImages = data.images || [];
  const names = new Set(_reImages.map(i => i.name));
  _tSelImages = new Set([..._tSelImages].filter(n => names.has(n)));  // bỏ tên ảnh không còn
  reRenderSide();
  if (_reImages.length && !_reName) reSelectImage(_reImages[0]);
}

function reRenderSide() {
  const side = $('reSide');
  if (!_reImages.length) { side.innerHTML = '<div class="re-pill" style="padding:8px">Thư mục không có ảnh.</div>'; return; }
  const scope = pinScope();
  const pinOnly = getPinOnly('region');
  const imgs = prepareImageList(_reImages, scope, getSortMode('region'), pinOnly);   // lọc + ghim + mode
  if (!imgs.length) {   // bật lọc "chỉ ghim" mà chưa ghim ảnh nào
    side.innerHTML = `<div class="re-pill" style="padding:8px">${escHtml(tr('pin.none'))}</div>`;
    return;
  }
  const frag = document.createDocumentFragment();
  for (const im of imgs) {
    const pinned = isPinned(scope, im.name);
    const fresh  = isFresh(im.mtime);
    const row = document.createElement('div');
    row.className = 're-thumb' + (im.name === _reName ? ' active' : '') + (pinned ? ' pinned' : '') + (fresh ? ' fresh' : '');
    const thumb = '/api/translate/image?path=' + encodeURIComponent(im.path) + '&thumb=92';
    const checked = _tSelImages.has(im.name) ? 'checked' : '';
    row.innerHTML = `<input type="checkbox" class="re-pickcb" ${checked} title="Tích để dịch ảnh này" />`
                  + `<img src="${thumb}" loading="lazy" alt="" />`
                  + `<span class="re-tn" title="${escHtml(im.name)}">${escHtml(im.name)}</span>`
                  + (fresh ? `<span class="re-fresh" title="${escHtml(tr('fresh.hint'))}">🆕</span>` : '')
                  + (im.count ? `<span class="re-badge">${im.count}</span>` : '')
                  + `<button class="re-pin${pinned ? ' on' : ''}" title="${escHtml(tr(pinned ? 'pin.undo' : 'pin.do'))}">📌</button>`;
    // Click checkbox = chọn ảnh để DỊCH; click 📌 = ghim/bỏ ghim; click chỗ khác = mở ảnh để SỬA vùng.
    row.addEventListener('click', e => {
      if (e.target.classList.contains('re-pickcb')) return;
      if (e.target.classList.contains('re-pin')) return;
      reSelectImage(im);
    });
    row.querySelector('.re-pickcb').addEventListener('change', () => {
      if (_tSelImages.has(im.name)) _tSelImages.delete(im.name); else _tSelImages.add(im.name);
      reUpdPickCount();
    });
    row.querySelector('.re-pin').addEventListener('click', e => {
      e.stopPropagation();
      togglePin(scope, im.name);   // togglePin tự gọi refreshPinViews() → đồng bộ cả 2 panel
    });
    frag.appendChild(row);
  }
  side.innerHTML = '';
  side.appendChild(frag);
  reUpdPickCount();
}

function reOnSortChange(mode) {
  setSortMode('region', mode);
  reRenderSide();
}

function reTogglePinOnly() {
  setPinOnly('region', !getPinOnly('region'));
  _syncPinOnlyButtons();
  reRenderSide();
}

// Đồng bộ với danh sách chọn ảnh _tSelImages (dùng chung với lưới ở Cài đặt).
function reUpdPickCount() {
  const el = $('rePickCount');
  if (el) el.textContent = _tSelImages.size ? `Đã chọn ${_tSelImages.size} ảnh để dịch` : 'Chưa chọn ảnh nào';
}

function reSelectAllTranslate(on) {
  _tSelImages = on ? new Set(_reImages.map(i => i.name)) : new Set();
  reRenderSide();
}

// Chọn tất cả ảnh đã có vùng sửa thủ công (im.count > 0 — ảnh có badge số).
function reSelectEdited() {
  _tSelImages = new Set(_reImages.filter(i => i.count).map(i => i.name));
  reRenderSide();
}

// ── Crop hàng loạt ───────────────────────────────────────────────────────────
// Gọi /api/images/crop cho các ảnh đã tích (không tích = cả thư mục).
// rect = khung chuẩn hoá 0..1 (vẽ trong editor), hoặc auto = tự dò viền đồng màu.
async function _reCropRun(payload, scopeLabel) {
  const dst = prompt(
    `${scopeLabel}\nThư mục lưu ảnh đã crop (nhập TRÙNG thư mục nguồn để GHI ĐÈ tại chỗ — vùng thủ công đã lưu sẽ bị lệch):`,
    _reDir + '_crop');
  if (dst === null) return;
  let data;
  try {
    const res = await fetch('/api/images/crop', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ src: _reDir, dst: dst.trim(), names: [..._tSelImages], ...payload }),
    });
    data = await res.json();
    if (!res.ok) throw new Error(data.error || 'lỗi');
  } catch (e) {
    alert('Crop thất bại: ' + (e.message || e)); return;
  }
  let msg = `✂ Đã crop ${data.cropped} ảnh → ${data.dst}`;
  if (data.skipped) msg += ` (bỏ qua ${data.skipped})`;
  if (data.ignored_count) msg += ` (loại ${data.ignored_count})`;
  if (data.fail_count) msg += ` — LỖI ${data.fail_count}`;
  tAddLog(msg, data.fail_count ? 'err' : 'ok');
  // Chi tiết từng ảnh — để biết TẠI SAO bị bỏ qua/loại/lỗi (trước đây không có log).
  (data.failed || []).forEach(d => tAddLog('   - lỗi: ' + d, 'err'));
  (data.ignored || []).forEach(d => tAddLog('   - loại: ' + d, 'err'));
  (data.skipped_detail || []).forEach(d => tAddLog('   · bỏ qua: ' + d));
  alert(msg + (data.fail_count || data.ignored_count
    ? '\n\nXem chi tiết lý do ở khung log bên dưới.' : ''));
  if (data.in_place) { _reName = ''; await reLoadList(); }  // nạp lại thumb + ảnh đang mở
}

async function reCropByRegion() {
  if (!(_reSel >= 0 && _reSel < _reRegions.length)) {
    alert('Vẽ/chọn 1 khung trùm phần ảnh muốn GIỮ trước (phần ngoài khung sẽ bị cắt bỏ).');
    return;
  }
  const r = _reRegions[_reSel];
  const scope = _tSelImages.size ? `${_tSelImages.size} ảnh đã tích` : 'TẤT CẢ ảnh trong thư mục';
  await _reCropRun({ rect: { x: r.x, y: r.y, w: r.w, h: r.h } },
                   `Crop ${scope} theo khung vùng đang chọn.`);
}

async function reAutoTrim() {
  const scope = _tSelImages.size ? `${_tSelImages.size} ảnh đã tích` : 'TẤT CẢ ảnh trong thư mục';
  await _reCropRun({ auto: true }, `Tự cắt viền đồng màu cho ${scope}.`);
}

// Nén NGAY ảnh có sẵn (không dịch lại) theo mức slider 'Dung lượng'.
async function reCompress() {
  const q = parseInt($('tImageQuality') ? $('tImageQuality').value : '80', 10) || 80;
  if (q >= 100) { alert('Kéo thanh "Dung lượng" xuống dưới 100 trước (thấp = nhẹ hơn), rồi bấm lại.'); return; }
  const scope = _tSelImages.size ? `${_tSelImages.size} ảnh đã tích` : 'TẤT CẢ ảnh trong thư mục';
  const dst = prompt(
    `Giảm dung lượng ${scope} ở mức ${q}.\nThư mục lưu (để TRỐNG = ghi đè tại chỗ trong thư mục nguồn; PNG sẽ thành .jpg):`,
    '');
  if (dst === null) return;
  let data;
  try {
    const res = await fetch('/api/images/compress', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ src: _reDir, dst: dst.trim(), names: [..._tSelImages], quality: q }),
    });
    data = await res.json();
    if (!res.ok) throw new Error(data.error || 'lỗi');
  } catch (e) {
    alert('Giảm dung lượng thất bại: ' + (e.message || e)); return;
  }
  let msg = `🗜 Nén ${data.done} ảnh: ${data.mb_before}MB → ${data.mb_after}MB (giảm ${data.saved_pct}%)`;
  if (data.fail_count) msg += ` — LỖI ${data.fail_count}`;
  if (data.ignored_count) msg += ` (loại ${data.ignored_count})`;
  tAddLog(msg, data.fail_count ? 'err' : 'ok');
  (data.failed || []).forEach(d => tAddLog('   - lỗi: ' + d, 'err'));
  alert(msg);
  if (data.in_place) { _reName = ''; await reLoadList(); }  // nạp lại thumb + ảnh đang mở
}

// Dịch ngay các ảnh đã tích, không cần ra màn chính. Tự lưu vùng của ảnh đang mở.
async function reTranslateSelected() {
  if (!_tSelImages.size) { alert('Hãy tích ít nhất 1 ảnh để dịch.'); return; }
  if (_reName) { try { await reSave(); } catch {} }   // áp vùng vừa sửa của ảnh đang mở
  // Đồng bộ lưới chọn ảnh ở Cài đặt (nếu đã tải) để hai nơi khớp nhau.
  if (typeof tRenderImgPick === 'function' && _tImgList && _tImgList.length) tRenderImgPick();
  closeRegionEditor();
  tStart();   // tStart() đọc thẳng _tSelImages
}

async function reSelectImage(im) {
  _reName = im.name;
  _reSel  = -1;
  $('reImgName').textContent = im.name;
  reRenderSide();
  // load saved regions
  let data = { mode: 'merge', regions: [] };
  try {
    const res = await fetch('/api/regions/get?dir=' + encodeURIComponent(_reDir) + '&img=' + encodeURIComponent(im.name));
    data = await res.json();
  } catch {}
  _reRegions = (data.regions || []).map(r => ({ x: +r.x, y: +r.y, w: +r.w, h: +r.h, text: r.text || '',
                                                font: r.font || '', font_size: +r.font_size || 0,
                                                inpaint_only: !!r.inpaint_only,
                                                erase_box: !!r.erase_box,
                                                erase_flat: !!r.erase_flat,
                                                flat_color: (typeof r.flat_color === 'string' ? r.flat_color : ''),
                                                mask_dilate: (r.mask_dilate != null ? +r.mask_dilate : null),
                                                rotate: +r.rotate || 0 }));
  reSetMode(data.mode === 'replace' ? 'replace' : 'merge');
  const md = $('reMaskDilate'); if (md) md.value = (data.mask_dilate != null ? data.mask_dilate : 1);
  reSyncTextInput();
  // load image
  const img = $('reImg');
  img.onload = () => {
    $('reEmpty').style.display = 'none';
    $('reStage').style.display = '';
    reFitCanvas();
  };
  img.src = '/api/translate/image?path=' + encodeURIComponent(im.path)
          + '&rev=' + encodeURIComponent(im.mtime || '0');
}

function reSetMode(mode) {
  _reMode = (mode === 'replace') ? 'replace' : 'merge';
  document.querySelectorAll('#reModeSeg button').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === _reMode));
}

function reFitCanvas() {
  const img = $('reImg'), cv = $('reCanvas');
  cv.width  = img.clientWidth;
  cv.height = img.clientHeight;
  reRedraw();
}

function reRedraw() {
  const cv = $('reCanvas'), ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cv.width, cv.height);
  _reRegions.forEach((r, i) => {
    const x = r.x * cv.width, y = r.y * cv.height, w = r.w * cv.width, h = r.h * cv.height;
    const sel = (i === _reSel);
    const ipo = !!r.inpaint_only;
    const typed = !ipo && !!(r.text && r.text.trim());
    // viền xanh dương = OCR tự đọc · xanh lá = có chữ gõ tay · cam = chỉ xoá · đỏ = đang chọn
    const col = sel ? '#ff5050' : (ipo ? '#ff9f40' : (typed ? '#3ddc84' : '#5b8cff'));
    ctx.fillStyle = sel ? 'rgba(255,80,80,.22)' : (ipo ? 'rgba(255,159,64,.20)' : (typed ? 'rgba(61,220,132,.18)' : 'rgba(91,140,255,.20)'));
    ctx.fillRect(x, y, w, h);
    ctx.lineWidth   = sel ? 2.5 : 1.5;
    if (ipo) ctx.setLineDash([6, 4]);
    ctx.strokeStyle = col;
    ctx.strokeRect(x, y, w, h);
    ctx.setLineDash([]);
    ctx.fillStyle = col;
    ctx.font = '12px sans-serif';
    const ebox = !ipo && !!r.erase_box;  // gõ tay + xoá cả khung
    const eflat = !!r.erase_flat;        // lấp khung bằng màu nền panel
    ctx.fillText((ipo ? '🧽 ' : (typed ? '✍ ' : '')) + (ebox ? '⬛ ' : '') + (eflat ? '▭ ' : '') + String(i + 1), x + 3, y + 13);
    if (typed) {
      ctx.fillStyle = 'rgba(0,0,0,.5)';
      ctx.fillRect(x, y + h - 16, w, 16);
      ctx.fillStyle = '#3ddc84';
      ctx.fillText(r.text.slice(0, 24), x + 3, y + h - 4);
    }
  });
  $('reCount').textContent = _reRegions.length + ' vùng';
}

// Đồng bộ ô nhập chữ + font + cỡ chữ + cờ "chỉ xoá" + siết mask + nghiêng với vùng đang chọn.
function reSyncTextInput() {
  const inp = $('reText'), selF = $('reFont'), inpS = $('reFontSize'), ipo = $('reInpaintOnly');
  const dil = $('reRegionDilate'), rot = $('reRotate'), ebox = $('reEraseBox'), eflat = $('reEraseFlat');
  const has = (_reSel >= 0 && _reSel < _reRegions.length);
  const r = has ? _reRegions[_reSel] : null;
  const only = !!(has && r.inpaint_only);
  if (ipo)  { ipo.disabled  = !has; ipo.checked = only; }
  // "Xoá khung": chỉ áp cho vùng gõ tay → tắt/disable khi đang "chỉ xoá" (đã xoá cả khung).
  if (ebox) { ebox.disabled = !has || only; ebox.checked = !!(has && !only && r.erase_box); }
  // "Xoá phẳng": áp cho cả vùng gõ tay lẫn "chỉ xoá" (lấp khung bằng màu nền panel).
  if (eflat) { eflat.disabled = !has; eflat.checked = !!(has && r.erase_flat); }
  // Màu lấp khung: Auto (vành ngoài box) hay tự chọn — chỉ bật khi vùng đang "Xoá phẳng".
  const fauto = $('reFlatAuto'), fcol = $('reFlatColor'), fpick = $('reFlatPick');
  const flatOn = !!(has && r.erase_flat);
  const manualCol = flatOn && !!r.flat_color;
  if (fauto) { fauto.disabled = !flatOn; fauto.checked = !manualCol; }
  if (fcol)  { fcol.disabled  = !flatOn; if (manualCol) fcol.value = r.flat_color; }
  if (fpick) { fpick.disabled = !flatOn; }
  // Khi "chỉ xoá": vô hiệu hoá ô chữ/font/cỡ/nghiêng (vùng này không vẽ chữ).
  if (inp)  { inp.disabled  = !has || only; inp.value  = has ? (r.text || '') : ''; }
  if (selF) { selF.disabled = !has || only; selF.value = has ? (r.font || '') : ''; }
  if (inpS) { inpS.disabled = !has || only; inpS.value = (has && r.font_size) ? r.font_size : ''; }
  if (rot)  { rot.disabled  = !has || only; rot.value  = (has && r.rotate) ? r.rotate : ''; }
  // Siết mask riêng vùng: bật cho mọi vùng đang chọn (rỗng = dùng mặc định của ảnh).
  if (dil)  { dil.disabled  = !has; dil.value = (has && r.mask_dilate != null) ? r.mask_dilate : ''; }
}

function reOnInpaintOnlyChange(checked) {
  if (_reSel >= 0 && _reSel < _reRegions.length) {
    _reRegions[_reSel].inpaint_only = !!checked;
    if (checked) { _reRegions[_reSel].text = ''; }  // chỉ xoá → không giữ chữ
    reSyncTextInput();
    reRedraw();
  }
}

function reOnEraseBoxChange(checked) {
  if (_reSel >= 0 && _reSel < _reRegions.length) {
    _reRegions[_reSel].erase_box = !!checked;
    if (checked) { _reRegions[_reSel].erase_flat = false; }  // 2 kiểu xoá khung loại trừ nhau
    reSyncTextInput();
    reRedraw();
  }
}

function reOnEraseFlatChange(checked) {
  if (_reSel >= 0 && _reSel < _reRegions.length) {
    _reRegions[_reSel].erase_flat = !!checked;
    if (checked) { _reRegions[_reSel].erase_box = false; }  // 2 kiểu xoá khung loại trừ nhau
    reSyncTextInput();
    reRedraw();
  }
}

// Màu lấp khung cho "Xoá phẳng": '' = auto (vành ngoài box), '#rrggbb' = tự chọn.
function reOnFlatColorChange(val) {
  if (_reSel >= 0 && _reSel < _reRegions.length && _reRegions[_reSel].erase_flat) {
    _reRegions[_reSel].flat_color = String(val || '');
    reSyncTextInput();  // bỏ tích "Màu auto"
  }
}

function reOnFlatAutoChange(checked) {
  if (_reSel >= 0 && _reSel < _reRegions.length && _reRegions[_reSel].erase_flat) {
    _reRegions[_reSel].flat_color = checked ? '' : ($('reFlatColor').value || '#222222');
    reSyncTextInput();
  }
}

// Hút màu trực tiếp từ ảnh bằng EyeDropper API (Chrome/Edge ≥ 95).
async function reFlatPickColor() {
  if (!(_reSel >= 0 && _reSel < _reRegions.length && _reRegions[_reSel].erase_flat)) return;
  if (!window.EyeDropper) { alert('Trình duyệt không hỗ trợ EyeDropper — hãy chọn màu bằng ô màu bên cạnh.'); return; }
  try {
    const res = await new window.EyeDropper().open();
    if (res && res.sRGBHex) {
      _reRegions[_reSel].flat_color = res.sRGBHex;
      reSyncTextInput();
    }
  } catch {}  // người dùng bấm Esc — bỏ qua
}

function reOnRegionDilateChange(val) {
  if (_reSel >= 0 && _reSel < _reRegions.length) {
    const s = String(val).trim();
    if (s === '') { _reRegions[_reSel].mask_dilate = null; return; }  // dùng mặc định ảnh
    const n = parseInt(s, 10);
    _reRegions[_reSel].mask_dilate = (Number.isFinite(n)) ? Math.max(0, Math.min(6, n)) : null;
  }
}

function reOnRotateChange(val) {
  if (_reSel >= 0 && _reSel < _reRegions.length) {
    const n = parseFloat(val);
    _reRegions[_reSel].rotate = (Number.isFinite(n)) ? Math.max(-180, Math.min(180, n)) : 0;
  }
}

function reOnTextInput(val) {
  if (_reSel >= 0 && _reSel < _reRegions.length) {
    _reRegions[_reSel].text = val;
    reRedraw();
  }
}

function reOnFontChange(val) {
  if (_reSel >= 0 && _reSel < _reRegions.length) _reRegions[_reSel].font = val || '';
}

function reOnFontSizeChange(val) {
  if (_reSel >= 0 && _reSel < _reRegions.length) {
    const n = parseInt(val, 10);
    _reRegions[_reSel].font_size = (Number.isFinite(n) && n >= 6) ? n : 0;
  }
}

function reCanvasPt(e) {
  const cv = $('reCanvas'), rect = cv.getBoundingClientRect();
  return {
    x: Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)),
    y: Math.max(0, Math.min(1, (e.clientY - rect.top) / rect.height)),
  };
}

function reHitTest(pt) {
  // topmost region containing pt
  for (let i = _reRegions.length - 1; i >= 0; i--) {
    const r = _reRegions[i];
    if (pt.x >= r.x && pt.x <= r.x + r.w && pt.y >= r.y && pt.y <= r.y + r.h) return i;
  }
  return -1;
}

function reInitCanvasEvents() {
  const cv = $('reCanvas');
  cv.addEventListener('mousedown', e => {
    e.preventDefault();
    _reDrag = reCanvasPt(e);
    _reDrag.moved = false;
  });
  cv.addEventListener('mousemove', e => {
    if (!_reDrag) return;
    const p = reCanvasPt(e);
    if (Math.abs(p.x - _reDrag.x) > 0.004 || Math.abs(p.y - _reDrag.y) > 0.004) _reDrag.moved = true;
    if (_reDrag.moved) {
      reRedraw();
      const ctx = cv.getContext('2d');
      const x = Math.min(_reDrag.x, p.x) * cv.width, y = Math.min(_reDrag.y, p.y) * cv.height;
      const w = Math.abs(p.x - _reDrag.x) * cv.width, h = Math.abs(p.y - _reDrag.y) * cv.height;
      ctx.fillStyle = 'rgba(91,140,255,.20)';
      ctx.fillRect(x, y, w, h);
      ctx.lineWidth = 1.5; ctx.strokeStyle = '#5b8cff';
      ctx.setLineDash([5, 4]); ctx.strokeRect(x, y, w, h); ctx.setLineDash([]);
    }
  });
  cv.addEventListener('mouseup', e => {
    if (!_reDrag) return;
    const p = reCanvasPt(e);
    if (_reDrag.moved) {
      const r = {
        x: Math.min(_reDrag.x, p.x), y: Math.min(_reDrag.y, p.y),
        w: Math.abs(p.x - _reDrag.x), h: Math.abs(p.y - _reDrag.y),
      };
      if (r.w > 0.005 && r.h > 0.005) { _reRegions.push({ ...r, text: '', font: '', font_size: 0, inpaint_only: false, erase_box: false, erase_flat: false, flat_color: '', mask_dilate: null, rotate: 0 }); _reSel = _reRegions.length - 1; }
    } else {
      _reSel = reHitTest(p);   // click → select / deselect
    }
    _reDrag = null;
    reRedraw();
    reSyncTextInput();
    if (_reSel >= 0) { const it = $('reText'); if (it) it.focus(); }
  });
  cv.addEventListener('mouseleave', () => { if (_reDrag) { _reDrag = null; reRedraw(); } });
}

function reDeleteSelected() {
  if (_reSel >= 0 && _reSel < _reRegions.length) {
    _reRegions.splice(_reSel, 1);
    _reSel = -1;
    reRedraw();
    reSyncTextInput();
  }
}

function reClearAll() {
  if (!_reRegions.length) return;
  if (!confirm('Xoá hết vùng của ảnh này?')) return;
  _reRegions = []; _reSel = -1; reRedraw(); reSyncTextInput();
}

async function reSave() {
  if (!_reName) return;
  let data;
  try {
    const res = await fetch('/api/regions/save', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        dir: _reDir, img: _reName, mode: _reMode, regions: _reRegions,
        mask_dilate: parseInt(($('reMaskDilate') || {}).value, 10) || 0,
      }),
    });
    data = await res.json();
    if (!res.ok) throw new Error(data.error || 'lỗi');
  } catch (e) {
    alert('Lưu thất bại: ' + (e.message || e)); return;
  }
  // update cached badge count
  const im = _reImages.find(x => x.name === _reName);
  if (im) im.count = data.count || 0;
  reRenderSide();
  tAddLog(`✏️ Lưu ${data.count || 0} vùng thủ công cho ${_reName} (${_reMode}).`, 'ok');
}

document.addEventListener('keydown', e => {
  if (!$('regionOverlay') || !$('regionOverlay').classList.contains('open')) return;
  const typing = /^(INPUT|TEXTAREA)$/.test((e.target && e.target.tagName) || '');
  if (e.key === 'Escape') { if (typing) e.target.blur(); else closeRegionEditor(); }
  else if ((e.key === 'Delete' || e.key === 'Backspace') && !typing) {
    if (_reSel >= 0) { e.preventDefault(); reDeleteSelected(); }
  }
});
window.addEventListener('resize', () => {
  if ($('regionOverlay') && $('regionOverlay').classList.contains('open') && _reName) reFitCanvas();
});
reInitCanvasEvents();

</script>
