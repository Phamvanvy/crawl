let _lang = 'vi';

function tr(key, ...args) {
  const v = (TRANSLATIONS[_lang] ?? TRANSLATIONS.vi)[key] ?? TRANSLATIONS.vi[key] ?? key;
  return typeof v === 'function' ? v(...args) : v;
}

function applyLang(lang) {
  _lang = lang;
  localStorage.setItem('lang', lang);
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = tr(el.dataset.i18n);
    if (v !== el.dataset.i18n) el.textContent = v;
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const v = tr(el.dataset.i18nPh);
    if (v !== el.dataset.i18nPh) el.placeholder = v;
  });
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    const v = tr(el.dataset.i18nTitle);
    if (v !== el.dataset.i18nTitle) el.title = v;
  });
  $('tabBtnCrawl').textContent     = tr('tab.crawl');
  $('tabBtnTranslate').textContent = tr('tab.translate');
  $('tabBtnViewer').textContent    = tr('tab.viewer');
  const isDark = document.documentElement.dataset.theme === 'dark';
  $('themeBtn').textContent = isDark ? tr('theme.light') : tr('theme.dark');
  $('langSelect').value = lang;
  document.documentElement.lang = lang;
}

function loadLang() {
  applyLang(localStorage.getItem('lang') || 'vi');
}

// ── Presets ──────────────────────────────────────────────────────────────────
const PRESETS = {
  fast:  { delay: 0.1, workers: 8,  timeout: 15  },
  safe:  { delay: 1.0, workers: 2,  timeout: 30  },
  heavy: { delay: 0.2, workers: 12, timeout: 20  },
  lazy:  { delay: 2.0, workers: 1,  timeout: 60  },
};

const DEFAULT_CONFIG = { delay: 0.3, workers: 4, timeout: 20, retries: 3, folder: "output" };

function applyPreset(name) {
  const p = PRESETS[name];
  if (!p) return;
  setVal("delayInput",   p.delay);
  setVal("workersInput", p.workers);
  setVal("timeoutInput", p.timeout);
  addLog(tr('alert.preset', tr(`preset.${name}.label`), p.delay, p.workers, p.timeout), "info");
}

// ── Config persistence ────────────────────────────────────────────────────────
function saveConfig() {
  const cfg = {
    url:       getVal("urlInput"),
    folder:    getVal("folderInput"),
    delay:     getVal("delayInput"),
    workers:   getVal("workersInput"),
    timeout:   getVal("timeoutInput"),
    retries:   getVal("retriesInput"),
    autoRetry:      $("autoRetryChk").checked,
    autoRetryTimes: getVal("autoRetryTimes"),
  };
  localStorage.setItem("crawlerConfig", JSON.stringify(cfg));
  addLog(tr('alert.saved_config'), "info");
}

function loadConfig() {
  try {
    const saved = JSON.parse(localStorage.getItem("crawlerConfig") || "{}");
    if (saved.url)     setVal("urlInput",     saved.url);
    if (saved.folder)  setVal("folderInput",  saved.folder);
    if (saved.delay   != null) setVal("delayInput",   saved.delay);
    if (saved.workers != null) setVal("workersInput", saved.workers);
    if (saved.timeout != null) setVal("timeoutInput", saved.timeout);
    if (saved.retries != null) setVal("retriesInput", saved.retries);
    if (saved.autoRetry      != null) $("autoRetryChk").checked    = !!saved.autoRetry;
    if (saved.autoRetryTimes != null) setVal("autoRetryTimes", saved.autoRetryTimes);
  } catch {}
}

function resetConfig() {
  setVal("delayInput",   DEFAULT_CONFIG.delay);
  setVal("workersInput", DEFAULT_CONFIG.workers);
  setVal("timeoutInput", DEFAULT_CONFIG.timeout);
  setVal("retriesInput", DEFAULT_CONFIG.retries);
  $("autoRetryChk").checked = false;
  setVal("autoRetryTimes", 3);
  setVal("folderInput",  DEFAULT_CONFIG.folder);
  addLog(tr('alert.reset_config'), "info");
}

function toggleTheme() {
  const html  = document.documentElement;
  const isDark = html.dataset.theme === "dark";
  html.dataset.theme = isDark ? "light" : "dark";
  document.getElementById("themeBtn").textContent = isDark ? tr("theme.light") : tr("theme.dark");
  localStorage.setItem("theme", html.dataset.theme);
}

  const savedTheme = localStorage.getItem("theme");
  if (savedTheme) {
    document.documentElement.dataset.theme = savedTheme;
    document.getElementById("themeBtn").textContent = savedTheme === "dark" ? tr("theme.light") : tr("theme.dark");
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const $  = (id) => document.getElementById(id);
const getVal = (id)    => $(id).value;
const setVal = (id, v) => { $(id).value = v; };

// ── Clear URL ──────────────────────────────────────────────────────────────────
function clearUrl() {
  setVal('urlInput', '');
  $('urlHint').textContent = '';
  $('urlInput').focus();
}

// ── URL hint ──────────────────────────────────────────────────────────────────
function onUrlChange() {
  const v = getVal("urlInput").trim();
  const hint = $("urlHint");
  if (!v) { hint.textContent = ""; return; }
  if (!v.startsWith("http://") && !v.startsWith("https://")) {
    hint.style.color = "var(--red)";
    hint.textContent = tr('alert.bad_url_hint');
  } else {
    hint.style.color = "var(--green)";
    hint.textContent = tr('alert.valid_url');
  }
}

// ── Log ───────────────────────────────────────────────────────────────────────
const logBox = $("logBox");

function addLog(msg, cls) {
  const empty = logBox.querySelector(".log-empty");
  if (empty) empty.remove();
  const line  = document.createElement("div");
  line.className = "log-line" + (cls ? " " + cls : "");
  line.textContent = msg;
  logBox.appendChild(line);
  logBox.scrollTop = logBox.scrollHeight;
}

function clearLog() {
  logBox.innerHTML = "";
}

function classifyLog(msg) {
  if (!msg) return "";
  if (msg.includes("[OK"))            return "ok";
  if (msg.includes("[FAIL"))          return "fail";
  if (msg.includes("[RETRY"))         return "warn";
  if (msg.includes("[skip]"))         return "skip";
  if (msg.includes("✘") || msg.includes("Lỗi")) return "fail";
  if (msg.includes("⚠"))             return "warn";
  if (msg.includes("✔") || msg.includes("Hoàn thành")) return "done";
  if (/^─+$/.test(msg.trim()))        return "sep";
  if (msg.startsWith("Đang tải") || msg.startsWith("Tìm thấy")) return "info";
  if (msg.startsWith("URL") || msg.startsWith("Folder") || msg.startsWith("Config")) return "info";
  return "";
}

// ── Status ────────────────────────────────────────────────────────────────────
function setStatus(text, type) {
  $("statusText").textContent = text;
  $("statusDot").className    = "status-dot" + (type ? " " + type : "");
}

// ── Progress ──────────────────────────────────────────────────────────────────
function showProgress(done, total) {
  $("progressWrap").style.display = "";
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  $("progFill").style.width   = pct + "%";
  $("progPct").textContent    = pct + "%";
  $("progLabel").textContent  = tr('prog.loading', done, total);
  $("statTotal").textContent  = tr('stat.total', total);
}

function showStats(ok, fail) {
  $("statOk").textContent   = `✓ ${ok}`;
  $("statFail").textContent  = `✗ ${fail}`;
}

// ── Crawl UI state ────────────────────────────────────────────────────────────
function setCrawling(on) {
  $("startBtn").disabled = on;
  $("stopBtn").disabled  = !on;
}

// ── Polling ───────────────────────────────────────────────────────────────────
let _cursor      = 0;
let _pollTimer   = null;
let _crawling    = false;

function startPolling() {
  if (_pollTimer) return;
  _pollTimer = setInterval(poll, 400);
}

function stopPolling() {
  clearInterval(_pollTimer);
  _pollTimer = null;
}

async function poll() {
  let data;
  try {
    const res = await fetch(`/api/logs?from=${_cursor}`);
    if (!res.ok) return;
    data = await res.json();
  } catch { return; }

  for (const entry of data.logs) {
    switch (entry.type) {
      case "log":
        addLog(entry.msg, classifyLog(entry.msg));
        break;
      case "progress":
        showProgress(entry.done, entry.total);
        break;
      case "done":
        showStats(entry.success, entry.failed);
        $("progLabel").textContent = tr('prog.done_crawl', entry.success + entry.failed);
        $("progFill").style.width  = "100%";
        $("progPct").textContent   = "100%";
        break;
    }
  }
  _cursor = data.total;

  if (!data.state.running && _crawling) {
    _crawling = false;
    setCrawling(false);
    stopPolling();
    const s = data.state.status;
    if (s === "done") {
      setStatus(tr('status.done_fmt', data.state.success, data.state.failed), "done");
      // Luôn đưa progress về 100% từ state thực (tránh trường hợp log bị trân bộ nhớ)
      showProgress(data.state.total, data.state.total);
      showStats(data.state.success, data.state.failed);
      $("progLabel").textContent = tr('prog.done_crawl', data.state.total);
      $("progFill").style.width  = "100%";
      $("progPct").textContent   = "100%";
      if (data.state.failed > 0) {
        let rounds;
        if (_autoRetryRoundsLeft > 0) {
          // continuing an auto-retry chain
          rounds = _autoRetryRoundsLeft;
        } else if ($("autoRetryChk").checked) {
          // first auto-retry kickoff after original crawl
          rounds = Math.max(1, parseInt(getVal("autoRetryTimes"), 10) || 1);
        } else {
          rounds = 0;
        }
        loadFailedItems(rounds);
      } else { $("failedPanel").style.display = "none"; _failedItems = []; }
    } else if (s === "error") {
      setStatus(tr('status.error'), "error");
    } else if (s === "stopped") {
      setStatus(tr('status.stopped'), "stopped");
    }
  }
}

// ── Start / Stop crawl ────────────────────────────────────────────────────────
async function startCrawl() {
  const url     = getVal("urlInput").trim();
  const folder  = getVal("folderInput").trim();
  const delay   = parseFloat(getVal("delayInput"));
  const workers = parseInt(getVal("workersInput"), 10);
  const timeout = parseInt(getVal("timeoutInput"), 10);
  const retries = parseInt(getVal("retriesInput"), 10);

  if (!url) {
    addLog(tr('alert.no_url'), "warn"); return;
  }
  if (!url.startsWith("http://") && !url.startsWith("https://")) {
    addLog(tr('alert.bad_url'), "warn"); return;
  }

  _cursor   = 0;
  _crawling = true;
  _autoRetryRoundsLeft = 0;
  clearLog();
  $('failedPanel').style.display = 'none';
  _failedItems = [];
  $('progressWrap').style.display = '';
  showProgress(0, 0);
  showStats(0, 0);
  setStatus(tr('status.crawling'), "running");
  setCrawling(true);
  startPolling();

  let res, json;
  try {
    res  = await fetch("/api/start", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ url, folder, delay, workers, timeout, retries }),
    });
    json = await res.json();
  } catch (e) {
    addLog(tr('alert.no_conn', e), "fail");
    setCrawling(false); stopPolling(); _crawling = false; return;
  }

  if (!res.ok) {
    addLog(`⚠  ${json.error || "Lỗi không xác định"}`, "warn");
    setStatus("Lỗi", "error");
    setCrawling(false); stopPolling(); _crawling = false;
  }
}

// ── Failed images panel ────────────────────────────────────────────────────────────────────────
let _failedItems = [];

function onAutoRetryChkChange() {
  $("autoRetryTimes").disabled = !$("autoRetryChk").checked;
}

async function loadFailedItems(roundsLeft = 0) {
  try {
    const res  = await fetch('/api/failed');
    const data = await res.json();
    _failedItems = data.items || [];
  } catch {
    _failedItems = [];
  }
  renderFailedPanel();
  if (roundsLeft > 0 && _failedItems.length) {
    addLog(`↺  Auto-retry (còn ${roundsLeft} lần): bắt đầu tải lại ảnh lỗi…`, 'info');
    _autoRetryRoundsLeft = roundsLeft - 1;
    retryFailed();
  } else {
    _autoRetryRoundsLeft = 0;
  }
}

let _autoRetryRoundsLeft = 0;

function renderFailedPanel() {
  const panel = $('failedPanel');
  const badge = $('failedCountBadge');
  const list  = $('failedUrlList');
  if (!_failedItems.length) { panel.style.display = 'none'; return; }
  badge.textContent = `${_failedItems.length} ảnh`;
  panel.style.display = '';
  list.innerHTML = '';
  for (const item of _failedItems) {
    const div = document.createElement('div');
    div.className = 'failed-url-item';
    div.innerHTML = `<span class="fi-idx">#${item.index}</span>`
                  + `<span class="fi-url" title="${escHtml(item.url)}">${escHtml(item.url)}</span>`;
    list.appendChild(div);
  }
}

function toggleFailedList() {
  const wrap = $('failedUrlWrap');
  const btn  = $('toggleFailedBtn');
  if (wrap.style.display === 'none') {
    wrap.style.display = '';
    btn.textContent = '\u25b2 Ẩn danh sách';
  } else {
    wrap.style.display = 'none';
    btn.textContent = '\u25ba Xem danh sách';
  }
}

function copyFailedUrls() {
  if (!_failedItems.length) return;
  const text = _failedItems.map(i => i.url).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    addLog(`\u{1F4CB}  Đã copy ${_failedItems.length} URL vào clipboard.`, 'info');
  }).catch(() => {
    addLog('⚠  Không thể copy (cần HTTPS hoặc localhost).', 'warn');
  });
}

async function retryFailed() {
  if (!_failedItems.length) return;
  const delay   = parseFloat(getVal('delayInput'));
  const workers = parseInt(getVal('workersInput'), 10);
  const timeout = parseInt(getVal('timeoutInput'), 10);
  const retries = parseInt(getVal('retriesInput'), 10);

  $('failedPanel').style.display = 'none';
  _cursor   = 0;
  _crawling = true;
  clearLog();
  $('progressWrap').style.display = '';
  showProgress(0, 0);
  showStats(0, 0);
  setStatus(tr('status.crawling'), 'running');
  setCrawling(true);
  startPolling();

  let res, json;
  try {
    res  = await fetch('/api/retry_failed', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ delay, workers, timeout, retries }),
    });
    json = await res.json();
  } catch (e) {
    addLog(tr('alert.no_conn', e), 'fail');
    setCrawling(false); stopPolling(); _crawling = false; return;
  }

  if (!res.ok) {
    addLog(`⚠  ${json.error || 'Lỗi không xác định'}`, 'warn');
    setStatus('Lỗi', 'error');
    setCrawling(false); stopPolling(); _crawling = false;
  }
}

async function stopCrawl() {

async function fbNavigate(path) {
  const body         = document.getElementById("fbBody");
  const breadcrumb   = document.getElementById("fbBreadcrumb");
  const selectedPath = document.getElementById("fbSelectedPath");

  body.innerHTML = '<div class="fb-loading">⏳ Đang tải…</div>';

  let data;
  try {
    const res = await fetch("/api/fs?path=" + encodeURIComponent(path));
    data = await res.json();
  } catch (e) {
    body.innerHTML = `<div class="fb-empty">⚠ Không tải được: ${escHtml(String(e))}</div>`;
    return;
  }

  if (data.error) {
    body.innerHTML = `<div class="fb-empty">⚠ ${escHtml(data.error)}</div>`;
    return;
  }

  _fbCurrentPath = data.path || "";
  breadcrumb.textContent   = _fbCurrentPath || "Ổ đĩa";
  selectedPath.textContent = _fbCurrentPath ? `📁 ${_fbCurrentPath}` : "Chọn thư mục bên dưới";

  body.innerHTML = "";

  function makeEntry(icon, label, targetPath, extraClass) {
    const div  = document.createElement("div");
    div.className = "fb-entry" + (extraClass ? " " + extraClass : "");
    div.innerHTML = `<span class="fb-icon">${icon}</span>`
                  + `<span class="fb-name">${escHtml(label)}</span>`
                  + `<span class="fb-arrow">▶</span>`;
    div.addEventListener("click", () => fbNavigate(targetPath));
    return div;
  }

  if (data.parent !== null && data.parent !== undefined) {
    body.appendChild(makeEntry("⬆", ".. (lên trên)", data.parent, "fb-up"));
  } else if (_fbCurrentPath) {
    body.appendChild(makeEntry("💻", "Danh sách ổ đĩa", "", "fb-up"));
  }

  if (data.entries.length === 0 && body.children.length === 0) {
    body.innerHTML = '<div class="fb-empty">Thư mục trống hoặc không có quyền truy cập</div>';
    return;
  }

  for (const entry of data.entries) {
    const icon = entry.path.match(/^[A-Za-z]:\\$/) ? "💾" : "📁";
    body.appendChild(makeEntry(icon, entry.name, entry.path, ""));
  }
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

async function runCheck() {
  let data;
  try {
    const res = await fetch('/api/translate/check');
    data = await res.json();
  } catch { return; }
  setCk('ck-torch',     !!data.torch,      data.torch      || 'pip install torch');
  setCk('ck-cuda',      data.cuda,         data.gpu        || (data.cuda ? 'OK' : 'No GPU'));
  setCk('ck-paddleocr', data.paddleocr,    data.paddleocr  ? 'OK' : 'pip install paddlepaddle paddleocr');
  setCk('ck-easyocr',   data.easyocr,      data.easyocr    ? 'OK (fallback)' : 'optional');
  setCk('ck-ollama',    data.ollama,       data.ollama     ? 'running' : (data.ollama_error || 'not running'));
  setCk('ck-mit',       data.mit,          data.mit        ? (data.mit_python || 'OK') : (data.mit_error || 'mit_venv không tìm thấy'));
  if (data.mit && $('tBackendDefault').checked) {
    $('tBackendMIT').checked = true;
    onBackendChange();
  }
  // LAMA hint
  const lamaEl  = $('tInpainter');
  const lamaHnt = $('lamaHint');
  if (lamaEl && lamaHnt) {
    lamaHnt.style.display = data.lama ? 'none' : '';
    if (!data.lama && lamaEl.value === 'lama') lamaEl.value = 'opencv';
  }
  const sel = $('tModelSelect');
  while (sel.options.length > 1) sel.remove(1);
  const sel2 = $('tMITModelSelect');
  if (sel2) while (sel2.options.length > 1) sel2.remove(1);
  for (const m of (data.ollama_models || [])) {
    const opt = document.createElement('option');
    opt.value = opt.textContent = m;
    sel.appendChild(opt);
    if (sel2) {
      const opt2 = document.createElement('option');
      opt2.value = opt2.textContent = m;
      sel2.appendChild(opt2);
    }
  }
}

// ── Translate log helpers ─────────────────────────────────────────────────────
const tLogBox = () => $('tLogBox');

function tAddLog(msg, cls) {
  const box   = tLogBox();
  const empty = box.querySelector('.log-empty');
  if (empty) empty.remove();
  const line  = document.createElement('div');
  line.className = 'log-line' + (cls ? ' ' + cls : '');
  line.textContent = msg;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function tClearLog() { tLogBox().innerHTML = ''; }

function tClassify(msg) {
  if (!msg) return '';
  if (msg.includes('[OK'))                              return 'ok';
  if (msg.includes('[FAIL]'))                           return 'fail';
  if (msg.includes('[SKIP]'))                           return 'skip';
  if (msg.includes('[TRANS]') || msg.includes('[OCR]')) return 'info';
  if (msg.includes('✔') || msg.includes('Xong'))       return 'done';
  if (msg.includes('⚠') || msg.includes('✘'))          return 'warn';
  if (/^─+$/.test(msg.trim()))                          return 'sep';
  return '';
}

function tSetStatus(text, type) {
  $('tStatusText').textContent = text;
  $('tStatusDot').className    = 'status-dot' + (type ? ' ' + type : '');
}

function tShowProgress(done, total) {
  $('tProgressWrap').style.display = '';
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  $('tProgFill').style.width  = pct + '%';
  $('tProgPct').textContent   = pct + '%';
  $('tProgLabel').textContent = tr('prog.translating', done, total);
  $('tStatTotal').textContent = tr('stat.total', total);
}

function tShowStats(ok, fail) {
  $('tStatOk').textContent   = `✓ ${ok}`;
  $('tStatFail').textContent = `✗ ${fail}`;
}

function tSetCrawling(on) {
  $('tStartBtn').disabled = on;
  $('tStopBtn').disabled  = !on;
}

// ── Translate polling ─────────────────────────────────────────────────────────
let _tCursor    = 0;
let _tPollTimer = null;
let _tRunning   = false;
let _tOutputDir = '';

function tStartPolling() {
  if (_tPollTimer) return;
  _tPollTimer = setInterval(tPoll, 500);
}

function tStopPolling() {
  clearInterval(_tPollTimer);
  _tPollTimer = null;
}

async function tPoll() {
  let data;
  try {
    const res = await fetch(`/api/translate/logs?from=${_tCursor}`);
    if (!res.ok) return;
    data = await res.json();
  } catch { return; }

  for (const entry of data.logs) {
    if (entry.type === 'log')      tAddLog(entry.msg, tClassify(entry.msg));
    if (entry.type === 'progress') tShowProgress(entry.done, entry.total);
    if (entry.type === 'done') {
      tShowStats(entry.success, entry.failed);
      $('tProgFill').style.width  = '100%';
      $('tProgPct').textContent   = '100%';
      $('tProgLabel').textContent = tr('prog.done_translate', entry.success + entry.failed);
      if (entry.output_dir) { _tOutputDir = entry.output_dir; tRefreshPreview(); }
    }
  }
  _tCursor = data.total;

  if (!data.state.running && _tRunning) {
    _tRunning = false;
    tSetCrawling(false);
    tStopPolling();
    const s = data.state.status;
    if (s === 'done') {
      tSetStatus(tr('status.t.done_fmt', data.state.success, data.state.failed), 'done');
      // Luôn đưa progress về 100% từ state thực
      tShowProgress(data.state.total, data.state.total);
      tShowStats(data.state.success, data.state.failed);
      $('tProgFill').style.width  = '100%';
      $('tProgPct').textContent   = '100%';
      $('tProgLabel').textContent = tr('prog.done_translate', data.state.total);
      if (data.state.failed > 0) {
        let rounds;
        if (_tAutoRetryRoundsLeft > 0) {
          rounds = _tAutoRetryRoundsLeft;
        } else if ($('tAutoRetryChk').checked) {
          rounds = Math.max(1, parseInt(getVal('tAutoRetryTimes'), 10) || 1);
        } else {
          rounds = 0;
        }
        tLoadFailed(rounds);
      } else {
        $('tFailedPanel').style.display = 'none';
        _tAutoRetryRoundsLeft = 0;
      }
    }
    if (s === 'error')   tSetStatus(tr('status.t.error'), 'error');
    if (s === 'stopped') tSetStatus(tr('status.t.stopped'), 'stopped');
  }
}

async function tStart() {
  const input_dir        = getVal('tInputDir').trim();

  const mit_target_lang  = getVal('tMITTargetLang');
  const mit_detector     = getVal('tMITDetector');
  const mit_inpainter    = getVal('tMITInpainter');
  const mit_upscale      = getVal('tMITUpscale');
  const mit_det_size     = getVal('tMITDetSize');
  const mit_mask_dil     = $('tMITMaskDil').value;
  const mit_unclip       = $('tMITUnclip').value;
  const mit_font_ofs     = $('tMITFontOfs').value;
  const mit_font_min     = $('tMITFontMin').value;
  const mit_font_fixed   = $('tMITFontFixed').value;
  const mit_font_color   = $('tMITFontColor').value;
  const mit_verbose      = $('tMITVerbose').checked;
  const mit_skip_no_text = $('tMITSkipNoText').checked;
  const mit_overwrite    = $('tMITOverwrite').checked;
  const mit_custom_api_base = getVal('tMITCustomOpenAiApiBase');
  const mit_custom_api_key  = getVal('tMITCustomOpenAiApiKey');
  const inpainter        = getVal('tInpainter') || 'opencv';
  const overwrite        = $('tOverwrite') ? $('tOverwrite').checked : false;
  const model            = (backend === 'mit' && getVal('tMITTranslator') === 'custom_openai' && _mitOllamaModel)
                           ? _mitOllamaModel
                           : (getVal('tModel').trim() || 'qwen3:8b');

  if (!input_dir) { tAddLog(tr('alert.no_input_dir'), 'warn'); return; }

  _tCursor    = 0;
  _tRunning   = true;
  _tOutputDir = output_dir;
  tClearLog();
  $('tProgressWrap').style.display = '';
  tShowProgress(0, 0);
  tShowStats(0, 0);
  tSetStatus(tr('status.t.running'), 'running');
  tSetCrawling(true);
  tStartPolling();

  let res, json;
  try {
    res  = await fetch('/api/translate/start', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        input_dir, output_dir, model, use_gpu, src_lang, backend,
        mit_translator, mit_target_lang,
        mit_detector, mit_inpainter, mit_upscale, mit_det_size,
        mit_mask_dil, mit_unclip, mit_font_ofs, mit_font_min, mit_font_fixed, mit_font_color,
        mit_custom_api_base, mit_custom_api_key,
        mit_verbose, mit_skip_no_text, mit_overwrite,
        inpainter, overwrite,
      }),
    });
    json = await res.json();
  } catch (e) {
    tAddLog(tr('alert.no_conn', e), 'fail');
    tSetCrawling(false); tStopPolling(); _tRunning = false; return;
  }

  if (!res.ok) {
    tAddLog(`⚠  ${json.error || 'Lỗi không xác định'}`, 'warn');
    tSetStatus(tr('status.t.error'), 'error');
    tSetCrawling(false); tStopPolling(); _tRunning = false;
  } else if (json.output_dir) {
    _tOutputDir = json.output_dir;
  }
}

async function tStop() {
  try { await fetch('/api/translate/stop', { method: 'POST' }); } catch {}
  tSetStatus(tr('status.t.stopping'), 'stopped');
}

// ── Translate auto-retry ──────────────────────────────────────────────────────
let _tAutoRetryRoundsLeft = 0;

function onTAutoRetryChkChange() {
  $('tAutoRetryTimes').disabled = !$('tAutoRetryChk').checked;
}

async function tLoadFailed(roundsLeft = 0) {
  let data;
  try {
    const res = await fetch('/api/translate/failed');
    data = await res.json();
  } catch { data = { images: [] }; }
  const imgs = data.images || [];
  const panel = $('tFailedPanel');
  const badge = $('tFailedBadge');
  if (!imgs.length) { panel.style.display = 'none'; return; }
  badge.textContent = `${imgs.length} ảnh lỗi`;
  panel.style.display = '';
  if (roundsLeft > 0) {
    tAddLog(`↺  Auto-retry dịch (còn ${roundsLeft} lần)…`, 'info');
    _tAutoRetryRoundsLeft = roundsLeft - 1;
    tRetryFailed();
  } else {
    _tAutoRetryRoundsLeft = 0;
  }
}

async function tRetryFailed() {
  const model     = getVal('tModel').trim() || 'qwen3:8b';
  const use_gpu   = $('tUseGpu').checked;
  const src_lang  = getVal('tSrcLang');
  const inpainter = getVal('tInpainter') || 'opencv';

  $('tFailedPanel').style.display = 'none';
  _tCursor  = 0;
  _tRunning = true;
  tClearLog();
  $('tProgressWrap').style.display = '';
  tShowProgress(0, 0);
  tShowStats(0, 0);
  tSetStatus(tr('status.t.running'), 'running');
  tSetCrawling(true);
  tStartPolling();

  let res, json;
  try {
    res  = await fetch('/api/translate/retry_failed', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ model, use_gpu, src_lang, inpainter }),
    });
    json = await res.json();
  } catch (e) {
    tAddLog(tr('alert.no_conn', e), 'fail');
    tSetCrawling(false); tStopPolling(); _tRunning = false; return;
  }
  if (!res.ok) {
    tAddLog(`⚠  ${json.error || 'Lỗi không xác định'}`, 'warn');
    tSetStatus(tr('status.t.error'), 'error');
    tSetCrawling(false); tStopPolling(); _tRunning = false;
  } else if (json.output_dir) {
    _tOutputDir = json.output_dir;
  }
}

// ── Preview ───────────────────────────────────────────────────────────────────
async function tRefreshPreview() {
  const folder = _tOutputDir || getVal('tOutputDir').trim();
  if (!folder) return;
  let data;
  try {
    const res = await fetch('/api/translate/preview?folder=' + encodeURIComponent(folder));
    data = await res.json();
  } catch { return; }

  const grid = $('tPreviewGrid');
  if (!data.images || data.images.length === 0) {
    grid.innerHTML = '<div class="log-empty" style="height:120px;grid-column:1/-1"><span>🖼</span><span>Chưa có ảnh</span></div>';
    return;
  }
  grid.innerHTML = '';
  const _lbList = [];
  for (const img of data.images) {
    const card = document.createElement('div');
    card.className = 'preview-card';
    const src = '/api/translate/image?path=' + encodeURIComponent(img.path) + '&t=' + Date.now();
    const lbIdx = _lbList.length;
    _lbList.push({ src, path: img.path, name: img.name, cardEl: card });
    card.innerHTML = `<img src="${src}" loading="lazy" alt="" />`
                   + `<div class="pc-name">${escHtml(img.name)}</div>`
                   + `<button class="pc-del-btn" title="Xóa ảnh này để dịch lại">🗑</button>`;
    card.querySelector('img').addEventListener('click', () => openLightbox(_lbList, lbIdx));
    card.querySelector('.pc-del-btn').addEventListener('click', e => {
      e.stopPropagation();
      tDeletePreviewImg(img.path, img.name, card);
    });
    grid.appendChild(card);
  }
}

async function tDeletePreviewImg(path, name, cardEl) {
  if (!confirm(`Xóa ảnh đã dịch "${name}"?\n→ Chạy lại sẽ dịch lại ảnh này.`)) return;
  try {
    const res  = await fetch('/api/viewer/delete', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ path }),
    });
    const data = await res.json();
    if (!res.ok) { alert(`Lỗi: ${data.error || 'không xóa được'}`); return; }
  } catch (e) {
    alert(`Lỗi kết nối: ${e}`); return;
  }
  cardEl.remove();
  const grid = $('tPreviewGrid');
  if (!grid.querySelector('.preview-card')) {
    grid.innerHTML = '<div class="log-empty" style="height:120px;grid-column:1/-1"><span>🖼</span><span>Chưa có ảnh</span></div>';
  }
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
let _lbImages = [];   // [{src, path, name, cardEl}]
let _lbIdx    = 0;
let _lbZoom   = 1.0;

function openLightbox(imgList, startIdx = 0) {
  _lbImages = Array.isArray(imgList) ? imgList : [{ src: imgList, path: '', name: '', cardEl: null }];
  _lbIdx    = Math.max(0, Math.min(startIdx, _lbImages.length - 1));
  _lbZoom   = 1.0;
  _lbRender();
  $('lightbox').classList.add('open');
}
function _lbRender() {
  const cur = _lbImages[_lbIdx];
  $('lightboxImg').src = cur.src;
  $('lbCounter').textContent = `${_lbIdx + 1} / ${_lbImages.length}`;
  $('lbName').textContent = cur.name || '';
  $('lbPrevBtn').disabled = _lbIdx === 0;
  $('lbNextBtn').disabled = _lbIdx === _lbImages.length - 1;
  $('lbDelBtn').style.display = cur.path ? '' : 'none';
  _lbApplyZoom();
}
function closeLightbox() {
  $('lightbox').classList.remove('open');
  $('lightboxImg').src = '';
}
function lbPrev() { if (_lbIdx > 0) { _lbIdx--; _lbZoom = 1; _lbRender(); } }
function lbNext() { if (_lbIdx < _lbImages.length - 1) { _lbIdx++; _lbZoom = 1; _lbRender(); } }
function lbZoomIn()    { _lbZoom = Math.min(5, parseFloat((_lbZoom + 0.25).toFixed(2))); _lbApplyZoom(); }
function lbZoomOut()   { _lbZoom = Math.max(0.25, parseFloat((_lbZoom - 0.25).toFixed(2))); _lbApplyZoom(); }
function lbZoomReset() { _lbZoom = 1; _lbApplyZoom(); }
function _lbApplyZoom() {
  $('lightboxImg').style.transform = `scale(${_lbZoom})`;
  $('lbZoomLabel').textContent = Math.round(_lbZoom * 100) + '%';
}
async function lbDelete() {
  const cur = _lbImages[_lbIdx];
  if (!cur.path) return;
  if (!confirm(`Xóa ảnh đã dịch "${cur.name}"?\n→ Chạy lại sẽ dịch lại ảnh này.`)) return;
  try {
    const res  = await fetch('/api/viewer/delete', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: cur.path }),
    });
    const data = await res.json();
    if (!res.ok) { alert(`Lỗi: ${data.error || 'không xóa được'}`); return; }
  } catch (e) { alert(`Lỗi kết nối: ${e}`); return; }
  if (cur.cardEl) cur.cardEl.remove();
  _lbImages.splice(_lbIdx, 1);
  if (_lbImages.length === 0) { closeLightbox(); return; }
  if (_lbIdx >= _lbImages.length) _lbIdx = _lbImages.length - 1;
  _lbZoom = 1;
  _lbRender();
}
// Wheel-to-zoom on lightbox
$('lightbox').addEventListener('wheel', e => {
  if (!$('lightbox').classList.contains('open')) return;
  e.preventDefault();
  e.deltaY < 0 ? lbZoomIn() : lbZoomOut();
}, { passive: false });

document.addEventListener('keydown', e => {
  const lbOpen = $('lightbox').classList.contains('open');
  if (lbOpen) {
    if (e.key === 'Escape')      { closeLightbox(); return; }
    if (e.key === 'ArrowLeft')   { e.preventDefault(); lbPrev(); return; }
    if (e.key === 'ArrowRight')  { e.preventDefault(); lbNext(); return; }
    if (e.key === '+' || e.key === '=') { e.preventDefault(); lbZoomIn(); return; }
    if (e.key === '-')           { e.preventDefault(); lbZoomOut(); return; }
    if (e.key === '0')           { e.preventDefault(); lbZoomReset(); return; }
    return;
  }
  if (e.key === 'Escape') { closeFolderBrowser(); }
  // Viewer page mode keyboard nav
  if ($('tab-viewer') && $('tab-viewer').style.display !== 'none' && _vMode === 'page') {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); vNext(); }
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); vPrev(); }
  }
  // Chapter navigation shortcuts ([ and ]) — work in both scroll and page mode
  if ($('tab-viewer') && $('tab-viewer').style.display !== 'none') {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === '[' || e.key === 'BracketLeft')  { e.preventDefault(); vPrevChap(); }
    if (e.key === ']' || e.key === 'BracketRight') { e.preventDefault(); vNextChap(); }
  }
});

// ── Image Viewer ──────────────────────────────────────────────────────────────
let _vImages          = [];       // [{name, path}]
let _vPage            = 0;        // 0-based
let _vMode            = 'scroll'; // 'scroll' | 'page'
let _vScrollObserver  = null;     // IntersectionObserver for infinite scroll
let _vScrollRendered  = 0;        // how many images currently in DOM
const V_SCROLL_BATCH  = 50;       // images per batch
let _vSiblings        = [];       // sibling folders [{name, path}]
let _vSibIdx          = -1;       // current folder index in siblings

function vSetMode(mode) {
  _vMode = mode;
  const isPage = mode === 'page';
  $('vScrollView').style.display = isPage ? 'none' : '';
  $('vPageView').style.display   = isPage ? ''     : 'none';
  $('vGoPageCard').style.display = isPage ? ''     : 'none';
  $('vKeyHint').style.display    = isPage ? ''     : 'none';
  $('vModeScroll').classList.toggle('active', !isPage);
  $('vModePage').classList.toggle('active',    isPage);
  // Show delete button only in page mode
  const delBtn = $('vDeleteBtn');
  if (delBtn) delBtn.style.display = isPage && _vImages.length ? '' : 'none';
  if (isPage && _vImages.length) vRenderPage();
}

async function vOpen() {
  const folder = getVal('vFolderInput').trim();
  if (!folder) return;
  const shortName = folder.replace(/\\/g, '/').split('/').filter(Boolean).pop() || folder;
  $('vFolderName').textContent = shortName;
  $('vImgCount').textContent   = '⏳';
  // Clear old images from DOM immediately before loading new folder
  vClearScroll();

  let data;
  try {
    const res = await fetch('/api/translate/preview?folder=' + encodeURIComponent(folder));
    if (!res.ok) throw new Error(res.status);
    data = await res.json();
  } catch (e) {
    $('vImgCount').textContent = '⚠ Lỗi';
    return;
  }

  _vImages = data.images || [];
  _vPage   = 0;
  $('vImgCount').textContent = tr('stat.img_count', _vImages.length);

  if (_vMode === 'scroll') vRenderScroll();
  else vRenderPage();

  vLoadSiblings(folder);
}

async function vLoadSiblings(folder) {
  // Compute parent: normalize to forward slashes, strip trailing slash, cut last segment
  const norm   = folder.replace(/\\/g, '/').replace(/\/+$/, '');
  const slash  = norm.lastIndexOf('/');
  if (slash <= 0) { _vSiblings = []; _vSibIdx = -1; vUpdateChapNav(); return; }
  const parent = folder.slice(0, slash); // preserve original separators
  try {
    const res  = await fetch('/api/fs?path=' + encodeURIComponent(parent));
    const data = await res.json();
    _vSiblings = data.entries || [];
    const normLc = norm.toLowerCase();
    _vSibIdx = _vSiblings.findIndex(e =>
      e.path.replace(/\\/g, '/').replace(/\/+$/, '').toLowerCase() === normLc
    );
  } catch (e) {
    _vSiblings = []; _vSibIdx = -1;
  }
  vUpdateChapNav();
}

function vUpdateChapNav() {
  const card = $('vChapNav');
  if (_vSiblings.length < 2 || _vSibIdx < 0) { card.style.display = 'none'; return; }
  card.style.display = '';
  $('vPrevChapBtn').disabled = _vSibIdx === 0;
  $('vNextChapBtn').disabled = _vSibIdx === _vSiblings.length - 1;
  $('vChapLabel').textContent = _vSiblings[_vSibIdx].name;
  $('vChapPos').textContent   = tr('v.chap.pos', _vSibIdx + 1, _vSiblings.length);
}

function vPrevChap() {
  if (_vSibIdx > 0) vOpenChap(_vSiblings[_vSibIdx - 1].path);
}

function vNextChap() {
  if (_vSibIdx < _vSiblings.length - 1) vOpenChap(_vSiblings[_vSibIdx + 1].path);
}

function vOpenChap(path) {
  $('vFolderInput').value = path;
  // Preserve siblings — only update index, skip re-fetching parent
  const norm  = path.replace(/\\/g, '/').replace(/\/+$/, '').toLowerCase();
  const newIdx = _vSiblings.findIndex(e =>
    e.path.replace(/\\/g, '/').replace(/\/+$/, '').toLowerCase() === norm
  );
  if (newIdx >= 0) {
    _vSibIdx = newIdx;
    vUpdateChapNav();
    // Load images directly without re-fetching siblings
    _vLoadFolderImages(path);
  } else {
    vOpen();
  }
}

async function _vLoadFolderImages(folder) {
  const shortName = folder.replace(/\\/g, '/').split('/').filter(Boolean).pop() || folder;
  $('vFolderName').textContent = shortName;
  $('vImgCount').textContent   = '⏳';
  vClearScroll();
  let data;
  try {
    const res = await fetch('/api/translate/preview?folder=' + encodeURIComponent(folder));
    if (!res.ok) throw new Error(res.status);
    data = await res.json();
  } catch (e) {
    $('vImgCount').textContent = '⚠ Lỗi';
    return;
  }
  _vImages = data.images || [];
  _vPage   = 0;
  $('vImgCount').textContent = tr('stat.img_count', _vImages.length);
  if (_vMode === 'scroll') vRenderScroll();
  else vRenderPage();
}

function vImgUrl(img) {
  return '/api/translate/image?path=' + encodeURIComponent(img.path);
}

function vApplyFit() {
  const fit = getVal('vFitSelect');
  $('vScrollView').className  = 'viewer-scroll fit-' + fit;
  $('vPageImgArea').className = 'vpage-img-area fit-' + fit;
}

function vRenderScroll() {
  // Disconnect any previous infinite-scroll observer
  if (_vScrollObserver) { _vScrollObserver.disconnect(); _vScrollObserver = null; }
  _vScrollRendered = 0;

  const c = $('vScrollView');
  c.innerHTML = '';
  vApplyFit();

  if (!_vImages.length) {
    c.innerHTML = `<div class="viewer-empty"><span style="font-size:2rem;opacity:.35">🖼</span><span>${tr('v.scroll.empty')}</span></div>`;
    return;
  }

  // Sentinel div at the bottom — observer loads next batch when it enters viewport
  const sentinel = document.createElement('div');
  sentinel.style.cssText = 'height:1px;width:100%;flex-shrink:0';
  c.appendChild(sentinel);

  function renderNextBatch() {
    const end  = Math.min(_vScrollRendered + V_SCROLL_BATCH, _vImages.length);
    const frag = document.createDocumentFragment();
    for (let i = _vScrollRendered; i < end; i++) {
      const el   = document.createElement('img');
      el.src     = vImgUrl(_vImages[i]);
      el.alt     = _vImages[i].name;
      el.title   = _vImages[i].name;
      el.loading = 'lazy';
      frag.appendChild(el);
    }
    c.insertBefore(frag, sentinel);
    _vScrollRendered = end;
    if (_vScrollRendered >= _vImages.length && _vScrollObserver) {
      _vScrollObserver.disconnect();
      _vScrollObserver = null;
    }
  }

  _vScrollObserver = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && _vScrollRendered < _vImages.length) {
      renderNextBatch();
    }
  }, { root: c, rootMargin: '600px' });

  _vScrollObserver.observe(sentinel);
  renderNextBatch(); // load first batch immediately
  c.scrollTop = 0;
}

function vRenderPage() {
  vApplyFit();
  const hasImages = _vImages.length > 0;
  $('vPageEmpty').style.display = hasImages ? 'none'  : 'flex';
  $('vPageImg').style.display   = hasImages ? ''      : 'none';
  $('vPrevBtn').disabled = !hasImages || _vPage === 0;
  $('vNextBtn').disabled = !hasImages || _vPage === _vImages.length - 1;

  const delBtn = $('vDeleteBtn');
  if (delBtn) delBtn.style.display = hasImages && _vMode === 'page' ? '' : 'none';

  if (!hasImages) {
    $('vPageNum').textContent   = '—';
    $('vPageTotal').textContent = '—';
    return;
  }
  const img = _vImages[_vPage];
  const el  = $('vPageImg');
  el.style.opacity = '0.35';
  el.onload = () => { el.style.opacity = '1'; };
  el.src = vImgUrl(img);
  el.alt = img.name;
  $('vPageNum').textContent   = _vPage + 1;
  $('vPageTotal').textContent = _vImages.length;
}

function vNext() {
  if (_vPage < _vImages.length - 1) { _vPage++; vRenderPage(); }
}

function vPrev() {
  if (_vPage > 0) { _vPage--; vRenderPage(); }
}

function vGoToPage() {
  const n = parseInt(getVal('vGoPageInput'), 10);
  const hint = $('vGoPageHint');
  if (!_vImages.length)       { hint.textContent = tr('alert.no_folder'); return; }
  if (isNaN(n) || n < 1 || n > _vImages.length) {
    hint.textContent = tr('alert.bad_page', _vImages.length);
    return;
  }
  hint.textContent = '';
  _vPage = n - 1;
  vRenderPage();
}

// click left / right half of image to navigate in page mode
function vPageClick(e) {
  if (_vMode !== 'page' || !_vImages.length) return;
  const w = e.currentTarget.offsetWidth;
  if (e.offsetX > w / 2) vNext(); else vPrev();
}

// ── Delete current image ──────────────────────────────────────────────────────
async function vDeleteCurrent() {
  if (_vMode !== 'page' || !_vImages.length) return;
  const img = _vImages[_vPage];
  if (!confirm(`Xóa ảnh "${img.name}"?\nHành động này không thể hoàn tác.`)) return;
  try {
    const res = await fetch('/api/viewer/delete', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ path: img.path }),
    });
    const data = await res.json();
    if (!res.ok) { alert(`Lỗi: ${data.error || 'không xóa được'}`); return; }
  } catch (e) {
    alert(`Lỗi kết nối: ${e}`); return;
  }
  // Remove from list and stay at same index (or move back if last)
  _vImages.splice(_vPage, 1);
  if (_vPage >= _vImages.length) _vPage = Math.max(0, _vImages.length - 1);
  $('vImgCount').textContent = tr('stat.img_count', _vImages.length);
  vRenderPage();
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadTheme();
loadConfig();
loadLang();

// ── Floating tooltip ──────────────────────────────────────────────────────────
(function () {
  // Create single floating div attached to <body>
  const ttEl = document.createElement('div');
  ttEl.id = 'tt-float';
  document.body.appendChild(ttEl);

  const MARGIN = 10; // px from viewport edge
  const GAP    = 8;  // px above the icon

  function show(icon, text) {
    ttEl.textContent = text;
    ttEl.classList.add('visible');

    const iconRect = icon.getBoundingClientRect();
    const ttW = ttEl.offsetWidth;
    const ttH = ttEl.offsetHeight;
    const vw  = window.innerWidth;

    // Horizontal: center over icon, clamp to viewport
    let left = iconRect.left + iconRect.width / 2 - ttW / 2;
    left = Math.max(MARGIN, Math.min(left, vw - ttW - MARGIN));

    // Vertical: above icon; flip below if not enough space
    let top = iconRect.top - ttH - GAP;
    if (top < MARGIN) top = iconRect.bottom + GAP;

    ttEl.style.left = left + 'px';
    ttEl.style.top  = top  + 'px';
  }

  function hide() { ttEl.classList.remove('visible'); }

  // Delegate events on all .tt-icon elements
  document.addEventListener('mouseover', function (e) {
    const icon = e.target.closest('.tt-icon');
    if (!icon) return;
    const wrap = icon.closest('.tt-wrap');
    const box  = wrap && wrap.querySelector('.tt-box');
    if (box) show(icon, box.textContent);
  });
  document.addEventListener('mouseout', function (e) {
    if (e.target.closest('.tt-icon')) hide();
  });
  document.addEventListener('scroll', hide, true);
})();
