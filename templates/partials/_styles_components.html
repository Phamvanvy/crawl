<style>
    /* ── Preset chips ───────────────────────────────────────────────────── */
    .presets { display: flex; gap: 7px; flex-wrap: wrap; }
    .chip {
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    /* ── Buttons ────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 7px;
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all .15s;
      font-family: inherit;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }
    .btn-primary  { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover:not(:disabled)  { filter: brightness(1.12); }
    .btn-danger   { background: var(--red);    color: #fff; border-color: var(--red); }
    .btn-danger:hover:not(:disabled)   { filter: brightness(1.1); }
    .btn-ghost    { background: transparent; border-color: var(--border); color: var(--text-muted); }
    .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }

    .action-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    /* ── Progress ───────────────────────────────────────────────────────── */
    .progress-wrap { margin-top: 16px; }
    .prog-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      margin-bottom: 6px;
    }
    .prog-label { color: var(--text-muted); }
    .prog-pct   { font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
    .prog-track {
      height: 5px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 99px;
      width: 0%;
      transition: width .35s ease;
    }
    .stats-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .stat-pill {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
      font-variant-numeric: tabular-nums;
    }
    .stat-blue   { background: var(--accent-dim);  color: var(--accent); }
    .stat-green  { background: var(--green-dim);   color: var(--green);  }
    .stat-red    { background: var(--red-dim);     color: var(--red);    }

    /* ── Failed URL list ───────────────────────────────────────────────────────── */
    .failed-url-list {
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface2);
    }
    .failed-url-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      font-size: .72rem;
      font-family: var(--mono);
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
    }
    .failed-url-item:last-child { border-bottom: none; }
    .fi-idx { color: var(--red); font-weight: 700; flex-shrink: 0; min-width: 2.8em; }
    .fi-url { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Status badge ───────────────────────────────────────────────────── */
    .status-row { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }
    .status-dot.running  { background: var(--green);  animation: blink 1.2s infinite; }
    .status-dot.done     { background: var(--green); }
    .status-dot.error    { background: var(--red); }
    .status-dot.stopped  { background: var(--yellow); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── Details/summary adv toggle ─────────────────────────────────────── */
    details summary::-webkit-details-marker { display: none; }
    details > div { animation: fadeIn .15s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

    /* ── Log panel ──────────────────────────────────────────────────────── */
    .log-panel { display: flex; flex-direction: column; min-height: 520px; }
    .log-body {
      flex: 1;
      background: #010409;
      padding: 12px 14px;
      font-family: var(--mono);
      font-size: 0.78rem;
      line-height: 1.7;
      overflow-y: auto;
      min-height: 460px;
      max-height: 72vh;
    }
    .log-line { white-space: pre-wrap; word-break: break-all; color: #8b949e; }
    .log-line.ok     { color: #3fb950; }
    .log-line.fail   { color: #f85149; }
    .log-line.warn   { color: #d29922; }
    .log-line.done   { color: #58a6ff; font-weight: 600; }
    .log-line.sep    { color: #21262d; }
    .log-line.info   { color: #58a6ff; }
    .log-line.skip   { color: #6e7681; font-style: italic; }
    .log-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.8rem;
      opacity: .5;
      gap: 6px;
    }

    /* ── Folder row ─────────────────────────────────────────────────────── */
    .folder-row { display: flex; gap: 6px; align-items: stretch; }
    .folder-row input { flex: 1; min-width: 0; }
    .btn-browse { padding: 7px 12px; font-size: 0.82rem; flex-shrink: 0; }

    /* ── URL Tag Input ──────────────────────────────────────────────────── */
    .url-tag-box {
      min-height: 80px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-content: flex-start;
      cursor: text;
      transition: border-color .15s, box-shadow .15s;
    }
    .url-tag-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .url-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: var(--accent-dim);
      border: 1px solid rgba(88,166,255,.35);
      border-radius: 99px;
      padding: 2px 5px 2px 10px;
      font-size: 0.75rem;
      color: var(--accent);
      font-family: var(--mono);
      max-width: 100%;
      overflow: hidden;
      animation: tagIn .12s ease;
    }
    [data-theme="light"] .url-tag { border-color: rgba(9,105,218,.35); }
    @keyframes tagIn { from { opacity:0; transform:scale(.85); } to { opacity:1; transform:none; } }
    .url-tag-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 230px;
    }
    .url-tag-rm {
      cursor: pointer;
      opacity: .55;
      font-size: 0.9rem;
      padding: 0 3px;
      flex-shrink: 0;
      background: none;
      border: none;
      color: inherit;
      font-family: inherit;
      line-height: 1;
      border-radius: 50%;
    }
    .url-tag-rm:hover { opacity: 1; background: rgba(88,166,255,.25); }
    .url-tag-input {
      flex: 1;
      min-width: 200px;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.88rem;
      padding: 3px 5px;
      font-family: inherit;
    }
    .url-tag-input::placeholder { color: var(--text-muted); opacity: .55; }
    .url-tag-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 4px;
    }
    .url-tag-footer .field-hint { flex: 1; }
    kbd {
      font-family: var(--mono);
      font-size: .72em;
      padding: 1px 4px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
    }

    /* ── Tab strip ──────────────────────────────────────────────────────── */
    .tabs-strip {
      display: flex;
      gap: 2px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      background: none; border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      padding: 9px 20px;
      cursor: pointer;
      font-size: 0.88rem; font-weight: 600;
      color: var(--text-muted);
      font-family: inherit;
      transition: color .15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Check badges ───────────────────────────────────────────────────── */
    .check-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px; margin-top: 6px;
    }
    .check-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.75rem; padding: 5px 8px;
      border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface2);
    }
    .check-item .ci-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      background: var(--text-muted);
    }
    .check-item.ok  .ci-dot { background: var(--green); }
    .check-item.bad .ci-dot { background: var(--red);   }
    .check-item .ci-label { color: var(--text-muted); }
    .check-item .ci-val   { color: var(--text); font-weight: 600; margin-left: auto; font-size: 0.7rem; }

    /* ── Preview grid ───────────────────────────────────────────────────── */
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
      padding: 10px;
    }
    .preview-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .15s, transform .1s;
      background: var(--surface2);
      position: relative;
    }
    .preview-card:hover { border-color: var(--accent); transform: scale(1.02); }
    .preview-card img  { width: 100%; height: 90px; object-fit: cover; display: block; }
    .preview-card .pc-name {
      font-size: 0.68rem; padding: 4px 6px;
      color: var(--text-muted); overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .preview-card .pc-del-btn {
      display: none;
      position: absolute; top: 4px; right: 4px;
      background: rgba(0,0,0,.6); color: #fff;
      border: none; border-radius: 4px;
      padding: 2px 5px; font-size: .75rem;
      cursor: pointer; line-height: 1.2;
    }
    .preview-card:hover .pc-del-btn { display: block; }

</style>
