<script>
// ── Modal accessibility: focus-on-open, focus restore, Tab focus-trap ──────────
let _activeDialogEl = null;
let _lastFocusBeforeModal = null;

function _focusableIn(el) {
  return [...el.querySelectorAll(
    'a[href],button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])'
  )].filter(n => n.offsetParent !== null);  // visible only (skips hidden tab panes)
}
function _modalOpened(dialogEl) {
  _lastFocusBeforeModal = document.activeElement;
  _activeDialogEl = dialogEl || null;
  if (!_activeDialogEl) return;
  const f = _focusableIn(_activeDialogEl);
  (f[0] || _activeDialogEl).focus();
}
function _modalClosed() {
  _activeDialogEl = null;
  if (_lastFocusBeforeModal && typeof _lastFocusBeforeModal.focus === 'function') {
    _lastFocusBeforeModal.focus();
  }
  _lastFocusBeforeModal = null;
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
let _lbImages = [];   // [{src, path, name, cardEl, origDir}]
let _lbIdx    = 0;
let _lbZoom   = 1.0;
let _lbCompare = false;  // bật xem song song Gốc ↔ Đã dịch

function openLightbox(imgList, startIdx = 0) {
  _lbImages = Array.isArray(imgList) ? imgList : [{ src: imgList, path: '', name: '', cardEl: null }];
  _lbIdx    = Math.max(0, Math.min(startIdx, _lbImages.length - 1));
  _lbZoom   = 1.0;
  _lbCompare = false;
  _lbRender();
  $('lightbox').classList.add('open');
  _modalOpened($('lightbox'));
}
function _lbRender() {
  const cur = _lbImages[_lbIdx];
  $('lightboxImg').src = cur.src;
  $('lightboxImg').alt = cur.name || '';
  $('lbCounter').textContent = `${_lbIdx + 1} / ${_lbImages.length}`;
  $('lbName').textContent = cur.name || '';
  $('lbPrevBtn').disabled = _lbIdx === 0;
  $('lbNextBtn').disabled = _lbIdx === _lbImages.length - 1;
  $('lbDelBtn').style.display = cur.path ? '' : 'none';
  // Nút "So sánh gốc" chỉ hiện khi ảnh này biết thư mục nguồn để đối chiếu.
  const canCompare = !!(cur.origDir && cur.name);
  $('lbCompareBtn').style.display = canCompare ? '' : 'none';
  if (!canCompare) _lbCompare = false;
  _lbRenderPin();
  _lbRenderCompare();
  _lbApplyZoom();
}
// Phạm vi ghim của ảnh đang xem = thư mục nguồn (chung gốc↔dịch như 2 panel kia).
function _lbPinScope(cur) {
  return (cur && cur.origDir) || (typeof pinScope === 'function' ? pinScope() : '');
}
function _lbRenderPin() {
  const btn = $('lbPinBtn');
  if (!btn) return;
  const cur = _lbImages[_lbIdx];
  const scope = _lbPinScope(cur);
  const canPin = !!(scope && cur && cur.name && typeof togglePin === 'function');
  btn.style.display = canPin ? '' : 'none';
  if (!canPin) return;
  const pinned = isPinned(scope, cur.name);
  btn.classList.toggle('active', pinned);
  btn.title = tr(pinned ? 'pin.undo' : 'pin.do');
}
function lbTogglePin() {
  const cur = _lbImages[_lbIdx];
  const scope = _lbPinScope(cur);
  if (!cur || !cur.name || !scope || typeof togglePin !== 'function') return;
  togglePin(scope, cur.name);   // tự refreshPinViews() → đồng bộ lưới + editor (+ tab khác qua 'storage')
  _lbRenderPin();
}
// Dựng/ẩn khung so sánh song song theo trạng thái _lbCompare.
function _lbRenderCompare() {
  const cur = _lbImages[_lbIdx];
  $('lbCompareBtn').classList.toggle('active', _lbCompare);
  if (_lbCompare && cur.origDir && cur.name) {
    $('lightboxImg').style.display = 'none';
    $('lbCompare').style.display   = 'flex';
    $('lbTransImg').src = cur.src;
    const miss = $('lbOrigMissing'), oimg = $('lbOrigImg');
    miss.style.display = 'none';
    oimg.style.display = '';
    oimg.onerror = () => { oimg.style.display = 'none'; miss.style.display = ''; };
    oimg.src = '/api/translate/source?dir=' + encodeURIComponent(cur.origDir)
             + '&name=' + encodeURIComponent(cur.name);
  } else {
    $('lbCompare').style.display   = 'none';
    $('lightboxImg').style.display = '';
  }
}
function lbToggleCompare() {
  const cur = _lbImages[_lbIdx];
  if (!cur || !cur.origDir || !cur.name) return;
  _lbCompare = !_lbCompare;
  _lbRenderCompare();
  _lbApplyZoom();
}
function closeLightbox() {
  $('lightbox').classList.remove('open');
  $('lightboxImg').src = '';
  _modalClosed();
}
function lbPrev() { if (_lbIdx > 0) { _lbIdx--; _lbZoom = 1; _lbRender(); } }
function lbNext() { if (_lbIdx < _lbImages.length - 1) { _lbIdx++; _lbZoom = 1; _lbRender(); } }
function lbZoomIn()    { _lbZoom = Math.min(5, parseFloat((_lbZoom + 0.25).toFixed(2))); _lbApplyZoom(); }
function lbZoomOut()   { _lbZoom = Math.max(0.25, parseFloat((_lbZoom - 0.25).toFixed(2))); _lbApplyZoom(); }
function lbZoomReset() { _lbZoom = 1; _lbApplyZoom(); }
function _lbApplyZoom() {
  const t = `scale(${_lbZoom})`;
  $('lightboxImg').style.transform = t;
  $('lbOrigImg').style.transform   = t;
  $('lbTransImg').style.transform  = t;
  $('lbZoomLabel').textContent = Math.round(_lbZoom * 100) + '%';
}
async function lbDelete() {
  const cur = _lbImages[_lbIdx];
  if (!cur.path) return;
  if (!confirm(`Xóa ảnh đã dịch "${cur.name}"?\n→ Chạy lại sẽ dịch lại ảnh này.`)) return;
  try {
    const res  = await fetch('/api/viewer/delete', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: cur.path }),
    });
    const data = await res.json();
    if (!res.ok) { alert(`Lỗi: ${data.error || 'không xóa được'}`); return; }
  } catch (e) { alert(`Lỗi kết nối: ${e}`); return; }
  if (cur.cardEl) cur.cardEl.remove();
  _lbImages.splice(_lbIdx, 1);
  if (_lbImages.length === 0) { closeLightbox(); return; }
  if (_lbIdx >= _lbImages.length) _lbIdx = _lbImages.length - 1;
  _lbZoom = 1;
  _lbRender();
}
// Wheel-to-zoom on lightbox
$('lightbox').addEventListener('wheel', e => {
  if (!$('lightbox').classList.contains('open')) return;
  e.preventDefault();
  e.deltaY < 0 ? lbZoomIn() : lbZoomOut();
}, { passive: false });

document.addEventListener('keydown', e => {
  // Focus-trap: keep Tab inside the currently open dialog
  if (_activeDialogEl && e.key === 'Tab') {
    const f = _focusableIn(_activeDialogEl);
    if (f.length) {
      const first = f[0], last = f[f.length - 1];
      if (!_activeDialogEl.contains(document.activeElement)) {
        e.preventDefault(); first.focus();
      } else if (e.shiftKey && document.activeElement === first) {
        e.preventDefault(); last.focus();
      } else if (!e.shiftKey && document.activeElement === last) {
        e.preventDefault(); first.focus();
      }
    }
  }

  const lbOpen = $('lightbox').classList.contains('open');
  if (lbOpen) {
    if (e.key === 'Escape')      { closeLightbox(); return; }
    if (e.key === 'ArrowLeft')   { e.preventDefault(); lbPrev(); return; }
    if (e.key === 'ArrowRight')  { e.preventDefault(); lbNext(); return; }
    if (e.key === 'Delete')      { e.preventDefault(); lbDelete(); return; }
    if (e.key === 'c' || e.key === 'C') { e.preventDefault(); lbToggleCompare(); return; }
    if (e.key === 'p' || e.key === 'P') { e.preventDefault(); lbTogglePin(); return; }
    if (e.key === '+' || e.key === '=') { e.preventDefault(); lbZoomIn(); return; }
    if (e.key === '-')           { e.preventDefault(); lbZoomOut(); return; }
    if (e.key === '0')           { e.preventDefault(); lbZoomReset(); return; }
    return;
  }
  if (e.key === 'Escape') {
    closeFolderBrowser();
    if (typeof closeSettingsModal === 'function') closeSettingsModal();
  }
  // Viewer page mode keyboard nav
  if ($('tab-viewer') && $('tab-viewer').style.display !== 'none' && _vMode === 'page') {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); vNext(); }
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); vPrev(); }
    if (e.key === 'Delete') { e.preventDefault(); vDeleteCurrent(); }
  }
  // Chapter navigation + fullscreen shortcuts — work in both scroll and page mode
  if ($('tab-viewer') && $('tab-viewer').style.display !== 'none') {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === '[' || e.key === 'BracketLeft')  { e.preventDefault(); vPrevChap(); }
    if (e.key === ']' || e.key === 'BracketRight') { e.preventDefault(); vNextChap(); }
    if (e.key === 'f' || e.key === 'F')            { e.preventDefault(); vToggleFullscreen(); }
  }
  // Translate preview: Delete key xóa card đang hover/focus
  if ($('tab-translate') && $('tab-translate').style.display !== 'none') {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'BUTTON') return;
    if (e.key === 'Delete' && typeof _tFocusedPreviewImg !== 'undefined' && _tFocusedPreviewImg) {
      e.preventDefault();
      tDeletePreviewImg(_tFocusedPreviewImg.path, _tFocusedPreviewImg.name, _tFocusedPreviewImg.cardEl);
    }
  }
});

</script>
