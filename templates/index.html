<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Crawler &amp; Translator</title>
  {% include 'partials/_styles.html' %}
</head>
<body>

{% include 'partials/_modals.html' %}

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header>
  <div class="brand">
    <div class="brand-icon">🕷</div>
    Image <span class="brand-accent">Crawler</span>
  </div>
  <div class="header-right">
    <span class="badge-version">v2.0 web</span>
    <select id="langSelect" class="lang-select" onchange="applyLang(this.value)">
      <option value="vi">🇻🇳 Tiếng Việt</option>
      <option value="en">🇺🇸 English</option>
      <option value="zh">🇨🇳 中文</option>
      <option value="ja">🇯🇵 日本語</option>
      <option value="ko">🇰🇷 한국어</option>
    </select>
    <button class="btn-theme" id="themeBtn" onclick="toggleTheme()">☀ Sáng</button>
  </div>
</header>

<!-- ── Tab strip ───────────────────────────────────────────────────────── -->
<nav class="tabs-strip">
  <button class="tab-btn active" id="tabBtnCrawl"     onclick="switchTab('crawl')">🕷 Crawl ảnh</button>
  <button class="tab-btn"        id="tabBtnTranslate" onclick="switchTab('translate')">🌐 Dịch ảnh</button>
  <button class="tab-btn"        id="tabBtnViewer"    onclick="switchTab('viewer')">📖 Xem ảnh</button>
</nav>

{% include 'partials/_tab_crawl.html' %}

{% include 'partials/_tab_translate.html' %}

{% include 'partials/_tab_viewer.html' %}

{% include 'partials/_scripts.html' %}

</body>
</html>
